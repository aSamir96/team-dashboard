                <div style={{ width: 30, height: 30, borderRadius: 9, background: i === 0 ? C.amber : "#fff", border: `1px solid ${C.line}`, color: i === 0 ? "#fff" : C.inkSoft, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, flexShrink: 0 }}>{i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 800, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>{s.member.name} <Pill color={sn.color}><Icon name="star" size={11} /> {sn.label}</Pill></div><div style={{ fontSize: 12, color: C.inkSoft }}>{ROLES[s.member.role]} · {s.count} حساب · أداء خام {s.base}</div></div>
                <div style={{ width: 120 }}><Bar pct={s.score} color={C.primary} /></div><div style={{ fontWeight: 800, color: C.primary, width: 36, textAlign: "left" }}>{s.score}</div>
              </div>); })}</div> : <Empty icon="award" title="لا يوجد أداء مسجّل" sub="سجّل أرقام الشهر من تبويب الأداء." />}
            <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 10 }}>الدرجة = الأداء الخام مضروبًا في معامل الليفل (الجونيور بيتحاسب برحمة أكتر). عدّل المعاملات من «الإعدادات».</div>
          </Card>
        </>
      )}
    </div>
  );
}

/* ===================== Projects ===================== */
function Projects({ data, update, month, setMonth }) {
  const [modal, setModal] = useState(null);
  const [q, setQ] = useState("");
  const [selected, setSelected] = useState(null);
  const [reportFor, setReportFor] = useState(null);
  const save = ({ project, memberIds }) => {
    const exists = data.projects.find((x) => x.id === project.id);
    const projects = exists ? data.projects.map((x) => (x.id === project.id ? project : x)) : [...data.projects, project];
    let assignments = data.assignments.filter((a) => a.projectId !== project.id);
    (memberIds || []).forEach((mid) => assignments.push({ id: uid(), memberId: mid, projectId: project.id }));
    update({ ...data, projects, assignments }); setModal(null);
  };
  const remove = (id) => { if (!confirm("هتمسح المشروع ده وكل البيانات المرتبطة بيه. متأكد؟")) return; update({ ...data, projects: data.projects.filter((x) => x.id !== id), assignments: data.assignments.filter((a) => a.projectId !== id), kpis: data.kpis.filter((k) => k.projectId !== id) }); setSelected(null); };

  if (reportFor) { const proj = data.projects.find((p) => p.id === reportFor); if (proj) return <ReportDeck data={data} update={update} project={proj} month={month} setMonth={setMonth} onBack={() => setReportFor(null)} />; }
  if (selected) { const proj = data.projects.find((p) => p.id === selected); if (proj) return <ProjectDetail data={data} project={proj} month={month} setMonth={setMonth} onBack={() => setSelected(null)} onEdit={() => setModal({ ...proj })} onReport={() => setReportFor(proj.id)} modal={modal} setModal={setModal} save={save} />; }
  const list = data.projects.filter((p) => p.name.includes(q) || (p.handle || "").includes(q) || (p.client || "").includes(q));
  return (
    <div>
      <Header title="المشاريع والحسابات" sub="كل مشروع بمنصّاته وروابطه وفريقه وأهدافه المتعددة" right={<Btn onClick={() => setModal({ new: true })}><Icon name="plus" size={16} /> إضافة مشروع</Btn>} />
      {data.projects.length > 0 && <div style={{ position: "relative", marginBottom: 16, maxWidth: 320 }}><span style={{ position: "absolute", right: 12, top: 11, color: C.inkSoft }}><Icon name="search" size={16} /></span><input placeholder="بحث بالاسم أو العميل…" value={q} onChange={(e) => setQ(e.target.value)} style={{ ...inputStyle, paddingRight: 36 }} /></div>}
      {data.projects.length === 0 ? (
        <Card><Empty icon="folder" title="مفيش مشاريع لسه" sub="ضيف أول حساب أو بروجكت." action={<Btn onClick={() => setModal({ new: true })}><Icon name="plus" size={16} /> إضافة مشروع</Btn>} /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(330px, 1fr))", gap: 14 }}>
          {list.map((p) => {
            const pr = PRIORITIES[p.priority] || PRIORITIES.med, overall = projectOverall(data, p, month);
            const team = assignedIdsFor(data, p.id).map((id) => data.members.find((m) => m.id === id)).filter(Boolean);
            return (
              <Card key={p.id} style={{ padding: 0, overflow: "hidden", cursor: "pointer" }} onClick={() => setSelected(p.id)}>
                <div style={{ height: 6, background: PLATFORMS[primaryPlatform(p)]?.color || C.inkSoft }} />
                <div style={{ padding: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div><div style={{ fontWeight: 800, fontSize: 17 }}>{p.name}</div><div style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 2 }}>{p.client ? `العميل: ${p.client}` : (p.handle || "")}</div></div>
                    <div style={{ display: "flex", gap: 4 }} onClick={(e) => e.stopPropagation()}><IconBtn onClick={() => setModal({ ...p })}><Icon name="pencil" size={15} /></IconBtn><IconBtn danger onClick={() => remove(p.id)}><Icon name="trash" size={15} /></IconBtn></div>
                  </div>
                  <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 12 }}><PlatformPills p={p} /><Pill color={pr.color}>أولوية {pr.label}</Pill>{(p.goals || []).length > 0 && <Pill color={C.inkSoft}><Icon name="target" size={11} /> {p.goals.length} أهداف</Pill>}{p.links && p.links.length > 0 && <Pill color={C.inkSoft}><Icon name="link" size={11} /> {p.links.length}</Pill>}</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 12 }}><span style={{ fontSize: 12, color: C.inkSoft, fontWeight: 700 }}>الفريق</span><Avatars members={team} /></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 12, color: C.inkSoft, fontWeight: 700, whiteSpace: "nowrap" }}>إنجاز {monthLabel(month).split(" ")[0]}</span>
                    {overall != null ? <><Bar pct={overall} color={achColor(overall)} /><span style={{ fontWeight: 800, color: achColor(overall), fontSize: 13, width: 40, textAlign: "left" }}>{overall}%</span></> : <span style={{ fontSize: 12, color: C.inkSoft }}>حدّد أهداف</span>}
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}
      {modal && <ProjectForm data={data} initial={modal.new ? null : modal} members={data.members} assignedIds={modal.new ? [] : assignedIdsFor(data, modal.id)} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function ProjectDetail({ data, project, month, setMonth, onBack, onEdit, onReport, modal, setModal, save }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const pr = PRIORITIES[project.priority] || PRIORITIES.med;
  const teamRows = assignedIdsFor(data, project.id).map((id) => { const m = data.members.find((x) => x.id === id); if (!m) return null; const rec = data.kpis.find((k) => k.memberId === m.id && k.projectId === project.id && k.month === month); return { member: m, rec }; }).filter(Boolean);
  const goals = project.goals || [];
  return (
    <div>
      <div className="no-print" style={{ marginBottom: 14, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <Btn kind="line" size="sm" onClick={onBack}><Icon name="back" size={15} /> رجوع للمشاريع</Btn>
        <Btn onClick={onReport}><Icon name="slides" size={16} /> التقرير الشامل (سلايدات)</Btn>
      </div>
      <Header title={project.name} sub={project.client ? `العميل: ${project.client}` : platformsLabel(project)} right={<><MonthPicker months={months} month={month} setMonth={setMonth} /><Btn kind="line" onClick={onEdit}><Icon name="pencil" size={15} /> تعديل</Btn></>} />
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
        <PlatformPills p={project} /><Pill color={C.inkSoft}>{project.type === "project" ? "بروجكت" : "حساب"}</Pill><Pill color={C.primary}>{OBJECTIVES[project.objective] || "—"}</Pill>
        <Pill color={pr.color}>أولوية {pr.label}</Pill><Pill color={project.status === "active" ? C.green : C.amber}>{project.status === "active" ? "نشط" : "متوقف"}</Pill>
        {project.startDate && <Pill color={C.inkSoft}><Icon name="calendar" size={12} /> بدأ {project.startDate}</Pill>}
      </div>
      {project.links && project.links.length > 0 && (
        <Card style={{ marginBottom: 16, padding: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 800, color: C.inkSoft, marginBottom: 8 }}>الروابط</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{project.links.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 700, textDecoration: "none", background: C.bg, padding: "7px 12px", borderRadius: 999 }}><Icon name="globe" size={14} /> {l.label || l.url}</a>)}</div>
        </Card>
      )}
      <Card style={{ marginBottom: 16 }}>
        <CardTitle>الأهداف × الفعلي — {monthLabel(month)}</CardTitle>
        {goals.length === 0 ? <Empty icon="target" title="مفيش أهداف محددة" sub="اضغط «تعديل» وأضف هدف أو أكتر." /> : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>{goals.map((g) => { const ga = goalAchievement(data, project, month, g); const withT = ga.per.filter((x) => x.target > 0); return (
            <div key={g.id} style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}><div style={{ fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><Icon name="target" size={16} color={C.primary} /> {g.name || "هدف"}</div>{ga.overall != null && <Pill color={achColor(ga.overall)}>{ga.overall}% — {achLabel(ga.overall)}</Pill>}</div>
              {withT.length === 0 ? <div style={{ fontSize: 12.5, color: C.inkSoft }}>مفيش قيم أهداف في الهدف ده.</div> : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{withT.map((x) => (
                  <div key={x.key}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}><span style={{ fontWeight: 700 }}>{x.label}</span><span style={{ color: C.inkSoft }}>{fmtMetric(x.metric, x.actual)} / هدف {fmtMetric(x.metric, x.target)}</span></div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}><Bar pct={x.pct == null ? 0 : x.pct} color={achColor(x.pct)} /><span style={{ width: 44, textAlign: "left", fontWeight: 800, fontSize: 13, color: achColor(x.pct) }}>{x.pct == null ? "—" : x.pct + "%"}</span></div>
                  </div>))}</div>
              )}
            </div>); })}</div>
        )}
      </Card>
      <Card>
        <CardTitle>الفريق على المشروع ({teamRows.length})</CardTitle>
        {teamRows.length === 0 ? <Empty icon="users" title="مفيش حد متعيّن" sub="اضغط «تعديل» وحدّد الفريق." /> : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 680 }}>
              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الفرد</th><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>المستوى</th><MetricHeadCells data={data} /></tr></thead>
              <tbody>{teamRows.map(({ member, rec }) => { const sn = SENIORITY[member.seniority] || SENIORITY.mid; return (
                <tr key={member.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                  <td style={{ padding: "10px", fontWeight: 700 }}>{member.name}</td><td style={{ padding: "10px" }}><Pill color={sn.color}>{sn.label}</Pill></td>
                  {rec ? <MetricCells data={data} rec={rec} /> : <td colSpan={data.metrics.length} style={{ padding: "10px", color: C.inkSoft }}>لم يُسجّل أداء هذا الشهر</td>}
                </tr>); })}</tbody>
            </table>
          </div>
        )}
        {project.notes && <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 14, lineHeight: 1.7, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>{project.notes}</div>}
      </Card>
      {modal && !modal.new && <ProjectForm data={data} initial={modal} members={data.members} assignedIds={assignedIdsFor(data, modal.id)} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function ProjectForm({ data, initial, members, assignedIds, onSave, onClose }) {
  const [f, setF] = useState(initial ? { ...initial, platforms: initial.platforms || [], links: initial.links || [], goals: initial.goals || [] } : { id: uid(), name: "", platforms: ["instagram"], type: "account", handle: "", status: "active", client: "", objective: "growth", startDate: "", priority: "med", links: [], goals: [{ id: uid(), name: "الهدف الأساسي", targets: {} }], notes: "" });
  const [memberIds, setMemberIds] = useState(assignedIds || []);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const togglePlatform = (k) => setF((p) => ({ ...p, platforms: p.platforms.includes(k) ? p.platforms.filter((x) => x !== k) : [...p.platforms, k] }));
  const toggleMember = (id) => setMemberIds((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));
  const setLink = (i, key, val) => setF((p) => { const links = [...p.links]; links[i] = { ...links[i], [key]: val }; return { ...p, links }; });
  const addLink = () => setF((p) => ({ ...p, links: [...p.links, { label: "", url: "" }] }));
  const delLink = (i) => setF((p) => ({ ...p, links: p.links.filter((_, j) => j !== i) }));
  const addGoal = () => setF((p) => ({ ...p, goals: [...(p.goals || []), { id: uid(), name: "", targets: {} }] }));
  const setGoalName = (gi, val) => setF((p) => { const goals = [...p.goals]; goals[gi] = { ...goals[gi], name: val }; return { ...p, goals }; });
  const setGoalTarget = (gi, mk, val) => setF((p) => { const goals = [...p.goals]; const targets = { ...goals[gi].targets }; if (val === "" || Number(val) === 0) delete targets[mk]; else targets[mk] = Number(val); goals[gi] = { ...goals[gi], targets }; return { ...p, goals }; });
  const delGoal = (gi) => setF((p) => ({ ...p, goals: p.goals.filter((_, i) => i !== gi) }));
  const submit = () => { if (!f.name.trim()) return; if (!f.platforms.length) { alert("اختر منصّة واحدة على الأقل."); return; } const goals = (f.goals || []).map((g) => ({ ...g, name: g.name.trim() || "هدف" })).filter((g) => Object.keys(g.targets).length > 0 || g.name); onSave({ project: { ...f, links: f.links.filter((l) => l.url || l.label), goals }, memberIds }); };
  return (
    <Modal wide title={initial ? "تعديل المشروع" : "مشروع / حساب جديد"} onClose={onClose}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="الاسم *"><input style={inputStyle} value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="اسم المشروع/الحساب" /></Field>
        <Field label="العميل / البراند"><input style={inputStyle} value={f.client} onChange={(e) => set("client", e.target.value)} placeholder="اسم العميل" /></Field>
      </div>
      <Field label="المنصّات (اختر أكتر من واحدة)">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{Object.entries(PLATFORMS).map(([k, v]) => { const on = f.platforms.includes(k); return <button key={k} type="button" onClick={() => togglePlatform(k)} style={{ border: `1px solid ${on ? v.color : C.line}`, background: on ? v.color + "14" : "#fff", color: on ? v.color : C.inkSoft, padding: "6px 12px", borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{on ? "✓ " : ""}{v.label}</button>; })}</div>
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        <Field label="النوع"><select style={inputStyle} value={f.type} onChange={(e) => set("type", e.target.value)}><option value="account">حساب</option><option value="project">بروجكت</option></select></Field>
        <Field label="الهدف العام"><select style={inputStyle} value={f.objective} onChange={(e) => set("objective", e.target.value)}>{Object.entries(OBJECTIVES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></Field>
        <Field label="الأولوية"><select style={inputStyle} value={f.priority} onChange={(e) => set("priority", e.target.value)}>{Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="المعرّف / اليوزر"><input style={inputStyle} value={f.handle} onChange={(e) => set("handle", e.target.value)} placeholder="@username" /></Field>
        <Field label="الحالة"><select style={inputStyle} value={f.status} onChange={(e) => set("status", e.target.value)}><option value="active">نشط</option><option value="paused">متوقف</option></select></Field>
      </div>
      <Field label="الفريق المسؤول عن المشروع">
        {members.length === 0 ? <div style={{ fontSize: 13, color: C.inkSoft }}>ضيف أفراد من تبويب «الفريق» الأول.</div> : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{members.map((m) => { const on = memberIds.includes(m.id); const sn = SENIORITY[m.seniority] || SENIORITY.mid; return <button key={m.id} type="button" onClick={() => toggleMember(m.id)} style={{ border: `1px solid ${on ? C.primary : C.line}`, background: on ? C.primarySoft : "#fff", color: on ? C.primary : C.inkSoft, padding: "6px 12px", borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{on ? "✓ " : "+ "}{m.name} <span style={{ opacity: .7, fontSize: 11 }}>({sn.label})</span></button>; })}</div>
        )}
      </Field>
      <Field label="الروابط (موقع العميل / لينكات المنصّات)">
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {f.links.map((l, i) => (
            <div key={i} style={{ display: "flex", gap: 8 }}>
              <input style={{ ...inputStyle, flex: "0 0 130px" }} placeholder="الوصف" value={l.label} onChange={(e) => setLink(i, "label", e.target.value)} />
              <input style={{ ...inputStyle, flex: 1 }} placeholder="https://..." value={l.url} onChange={(e) => setLink(i, "url", e.target.value)} />
              <IconBtn danger onClick={() => delLink(i)}><Icon name="x" size={15} /></IconBtn>
            </div>))}
          <Btn kind="ghost" size="sm" onClick={addLink} style={{ alignSelf: "flex-start" }}><Icon name="plus" size={14} /> إضافة رابط</Btn>
        </div>
      </Field>
      <Field label="تاريخ البداية"><input type="date" style={{ ...inputStyle, maxWidth: 200 }} value={f.startDate} onChange={(e) => set("startDate", e.target.value)} /></Field>
      <div style={{ background: C.bg, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div style={{ fontWeight: 800, fontSize: 13.5, display: "flex", alignItems: "center", gap: 6 }}><Icon name="target" size={15} color={C.primary} /> الأهداف (تقدر تضيف أكتر من هدف)</div>
          <Btn kind="ghost" size="sm" onClick={addGoal}><Icon name="plus" size={14} /> هدف جديد</Btn>
        </div>
        <div style={{ fontSize: 12, color: C.inkSoft, marginBottom: 10 }}>سيب المقياس فاضي لو مش جزء من الهدف ده.</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {(f.goals || []).map((g, gi) => (
            <div key={g.id} style={{ background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, padding: 12 }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                <input style={{ ...inputStyle, fontWeight: 700 }} placeholder="اسم الهدف (مثلاً: هدف حملة رمضان)" value={g.name} onChange={(e) => setGoalName(gi, e.target.value)} />
                <IconBtn danger onClick={() => delGoal(gi)}><Icon name="trash" size={15} /></IconBtn>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>{data.metrics.map((mt) => <label key={mt.key} style={{ fontSize: 12 }}><span style={{ display: "block", color: C.inkSoft, marginBottom: 3 }}>{mt.label}</span><input type="number" min="0" step="any" style={{ ...inputStyle, padding: "8px 10px" }} value={g.targets[mt.key] ?? ""} onChange={(e) => setGoalTarget(gi, mt.key, e.target.value)} placeholder="—" /></label>)}</div>
            </div>))}
          {(f.goals || []).length === 0 && <div style={{ fontSize: 12.5, color: C.inkSoft }}>مفيش أهداف — اضغط «هدف جديد».</div>}
        </div>
      </div>
      <Field label="ملاحظات"><textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={f.notes} onChange={(e) => set("notes", e.target.value)} /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}><Btn onClick={submit}>حفظ</Btn><Btn kind="line" onClick={onClose}>إلغاء</Btn></div>
    </Modal>
  );
}

/* ===================== Report Deck (comprehensive slides) ===================== */
function NoteBox({ label, icon, value, onSave, placeholder }) {
  const [v, setV] = useState(value || "");
  useEffect(() => { setV(value || ""); }, [value]);
  return (
    <div style={{ flex: 1, minWidth: 220 }}>
      <div style={{ fontSize: 12.5, fontWeight: 800, color: C.inkSoft, marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}><Icon name={icon} size={14} /> {label}</div>
      <textarea value={v} onChange={(e) => setV(e.target.value)} onBlur={() => onSave(v)} placeholder={placeholder} style={{ ...inputStyle, minHeight: 90, resize: "vertical", lineHeight: 1.7 }} />
    </div>
  );
}
function explainMetric(m, cur, prev, pct) {
  const v = (n) => fmtMetric(m, n);
  if ((Number(prev) || 0) === 0 && (Number(cur) || 0) === 0) return `لا توجد بيانات مسجّلة لـ«${m.label}» في الفترتين.`;
  if (pct == null) return `«${m.label}»: تم تسجيل ${v(cur)} لأول مرة هذه الفترة (لا يوجد رقم سابق للمقارنة).`;
  if (pct > 0) return `ارتفع «${m.label}» من ${v(prev)} إلى ${v(cur)} بزيادة ${pct}% مقارنة بالشهر السابق — اتجاه إيجابي يدعم تحقيق الأهداف.`;
  if (pct < 0) return `انخفض «${m.label}» من ${v(prev)} إلى ${v(cur)} بنسبة ${Math.abs(pct)}% مقارنة بالشهر السابق — يحتاج إلى مراجعة الأسباب ووضع خطة تحسين.`;
  return `«${m.label}» ثابت عند ${v(cur)} دون تغيّر عن الشهر السابق.`;
}
function Slide({ children, kicker, title }) {
  return <div className="slide" style={{ background: "#fff", border: `1px solid ${C.line}`, borderRadius: 18, padding: 26, boxShadow: "0 2px 14px #14162B0D", minHeight: 460 }}>
    {(kicker || title) && <div style={{ marginBottom: 18, borderBottom: `2px solid ${C.primarySoft}`, paddingBottom: 14 }}>{kicker && <div style={{ fontSize: 12.5, fontWeight: 800, color: C.primary, letterSpacing: 1, marginBottom: 4 }}>{kicker}</div>}{title && <div style={{ fontSize: 22, fontWeight: 800 }}>{title}</div>}</div>}
    {children}
  </div>;
}
function ReportDeck({ data, update, project, month, setMonth, onBack }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const prev = prevMonth(month);
  const cur = accountAgg(data, project.id, month);
  const pre = accountAgg(data, project.id, prev);
  const allMon = useMemo(() => { const s = new Set(data.kpis.filter((k) => k.projectId === project.id).map((k) => k.month)); s.add(month); return [...s].sort(); }, [data, project, month]);
  const trendMon = allMon.slice(-6);
  const [idx, setIdx] = useState(0);
  const note = (slide, kind) => data.reportNotes[`${project.id}::${month}::${slide}::${kind}`] || "";
  const saveNote = (slide, kind, val) => { const key = `${project.id}::${month}::${slide}::${kind}`; if ((data.reportNotes[key] || "") === val) return; update({ ...data, reportNotes: { ...data.reportNotes, [key]: val } }); };
  const improved = data.metrics.filter((m) => { const pc = pctChange(cur[m.key], pre[m.key]); return pc != null && pc > 0; }).length;
  const declined = data.metrics.filter((m) => { const pc = pctChange(cur[m.key], pre[m.key]); return pc != null && pc < 0; }).length;
  const team = assignedIdsFor(data, project.id).map((id) => data.members.find((m) => m.id === id)).filter(Boolean);

  const slides = [];
  // overview
  slides.push(
    <Slide key="ov" kicker="تقرير الأداء الشامل" title={`${project.name} — ${monthLabel(month)}`}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}><PlatformPills p={project} />{project.client && <Pill color={C.inkSoft}>العميل: {project.client}</Pill>}<Pill color={C.primary}>{OBJECTIVES[project.objective] || ""}</Pill></div>
      <div style={{ fontSize: 13.5, color: C.inkSoft, marginBottom: 16, lineHeight: 1.8 }}>مقارنة بين <b style={{ color: C.ink }}>{monthLabel(prev)}</b> و <b style={{ color: C.ink }}>{monthLabel(month)}</b>. النِسَب الخضراء = تحسّن، الحمراء = تراجع.</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 18 }}>
        {data.metrics.map((m) => { const pc = pctChange(cur[m.key], pre[m.key]); return (
          <div key={m.key} style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
            <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 6 }}>{m.label}</div>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}><div style={{ fontSize: 21, fontWeight: 800 }}>{fmtMetric(m, cur[m.key])}</div><Delta pct={pc} /></div>
            <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 4 }}>الشهر السابق: {fmtMetric(m, pre[m.key])}</div>
          </div>); })}
      </div>
      <div style={{ background: C.bg, borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 13.5, lineHeight: 1.8 }}>
        <b><Icon name="bulb" size={15} color={C.amber} /> قراءة سريعة:</b> خلال هذه الفترة تحسّن <b style={{ color: C.green }}>{improved}</b> من المقاييس وتراجع <b style={{ color: C.rose }}>{declined}</b>، على {cur.count} سجل أداء. الشرائح التالية تشرح كل مقياس بالتفصيل مع رسم بياني واتجاه.
      </div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
        <NoteBox label="ملاحظات عامة" icon="pencil" value={note("overview", "notes")} onSave={(v) => saveNote("overview", "notes", v)} placeholder="اكتب ملاحظاتك على الأداء العام للحساب…" />
        <NoteBox label="ترشيحات وخطوات قادمة" icon="bulb" value={note("overview", "recos")} onSave={(v) => saveNote("overview", "recos", v)} placeholder="اكتب توصياتك للشهر الجاي…" />
      </div>
    </Slide>
  );
  // per metric
  data.metrics.forEach((m, mi) => {
    const c = cur[m.key] || 0, p = pre[m.key] || 0, pc = pctChange(c, p), mx = Math.max(1, c, p);
    const trend = trendMon.map((mn) => { const a = accountAgg(data, project.id, mn); return { name: monthLabel(mn).split(" ")[0], v: m.pct ? +(a[m.key] || 0).toFixed(1) : Math.round(a[m.key] || 0) }; });
    const col = METRIC_COLORS[mi % METRIC_COLORS.length];
    slides.push(
      <Slide key={m.key} kicker={`مقياس ${mi + 1} من ${data.metrics.length}`} title={m.label}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1.1fr", gap: 18, marginBottom: 18 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 16, flexWrap: "wrap" }}>
              <div><div style={{ fontSize: 12, color: C.inkSoft }}>قبل ({monthLabel(prev).split(" ")[0]})</div><div style={{ fontSize: 24, fontWeight: 800, color: C.inkSoft }}>{fmtMetric(m, p)}</div></div>
              <Icon name="fwd" size={22} color={C.inkSoft} style={{ transform: "scaleX(-1)" }} />
              <div><div style={{ fontSize: 12, color: C.inkSoft }}>بعد ({monthLabel(month).split(" ")[0]})</div><div style={{ fontSize: 28, fontWeight: 800, color: col }}>{fmtMetric(m, c)}</div></div>
              <div style={{ marginRight: "auto" }}><Delta pct={pc} /></div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 40, fontSize: 12, color: C.inkSoft, fontWeight: 700 }}>قبل</span><Bar pct={(p / mx) * 100} color={C.inkSoft} height={14} /><span style={{ width: 70, textAlign: "left", fontWeight: 800, fontSize: 12.5 }}>{fmtMetric(m, p)}</span></div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 40, fontSize: 12, color: C.inkSoft, fontWeight: 700 }}>بعد</span><Bar pct={(c / mx) * 100} color={col} height={14} /><span style={{ width: 70, textAlign: "left", fontWeight: 800, fontSize: 12.5 }}>{fmtMetric(m, c)}</span></div>
            </div>
          </div>
          <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: 12 }}>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.inkSoft, marginBottom: 6 }}>الاتجاه عبر الشهور</div>
            <LineDual data={trend} series={[{ k: "v", color: col, label: m.label }]} height={170} />
          </div>
        </div>
        <div style={{ background: C.bg, borderRadius: 12, padding: 14, marginBottom: 16, fontSize: 13.5, lineHeight: 1.8 }}>
          <b><Icon name="bulb" size={15} color={col} /> شرح الأرقام:</b> {explainMetric(m, c, p, pc)}
        </div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          <NoteBox label="ملاحظات" icon="pencil" value={note(m.key, "notes")} onSave={(v) => saveNote(m.key, "notes", v)} placeholder={`ملاحظاتك على ${m.label}…`} />
          <NoteBox label="ترشيحات" icon="bulb" value={note(m.key, "recos")} onSave={(v) => saveNote(m.key, "recos", v)} placeholder="توصياتك لتحسين هذا المقياس…" />
        </div>
      </Slide>
    );
  });
  // team contribution
  slides.push(
    <Slide key="team" kicker="مساهمة الفريق" title="مين عمل إيه على الحساب">
      {team.length === 0 ? <Empty icon="users" title="مفيش فريق متعيّن" sub="حدّد الفريق من صفحة المشروع." /> : (
        <div style={{ overflowX: "auto", marginBottom: 16 }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 640 }}>
            <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الفرد</th><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>المستوى</th><MetricHeadCells data={data} /></tr></thead>
            <tbody>{team.map((mb) => { const rec = data.kpis.find((k) => k.memberId === mb.id && k.projectId === project.id && k.month === month); const sn = SENIORITY[mb.seniority] || SENIORITY.mid; return (
              <tr key={mb.id} style={{ borderBottom: `1px solid ${C.line}` }}><td style={{ padding: "10px", fontWeight: 700 }}>{mb.name}</td><td style={{ padding: "10px" }}><Pill color={sn.color}>{sn.label}</Pill></td>{rec ? <MetricCells data={data} rec={rec} /> : <td colSpan={data.metrics.length} style={{ padding: "10px", color: C.inkSoft }}>لم يُسجّل أداء</td>}</tr>); })}
              <tr style={{ background: C.bg, fontWeight: 800 }}><td style={{ padding: "10px" }} colSpan={2}>إجمالي الحساب</td>{data.metrics.map((m) => <td key={m.key} style={{ padding: "10px" }}>{fmtMetric(m, cur[m.key])}</td>)}</tr>
            </tbody>
          </table>
        </div>
      )}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
        <NoteBox label="ملاحظات على الفريق" icon="pencil" value={note("team", "notes")} onSave={(v) => saveNote("team", "notes", v)} placeholder="ملاحظاتك على أداء الفريق…" />
        <NoteBox label="ترشيحات" icon="bulb" value={note("team", "recos")} onSave={(v) => saveNote("team", "recos", v)} placeholder="توصياتك لتوزيع الشغل/التطوير…" />
      </div>
    </Slide>
  );

  return (
    <div className="deck">
      <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
        <Btn kind="line" size="sm" onClick={onBack}><Icon name="back" size={15} /> رجوع</Btn>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <MonthPicker months={months} month={month} setMonth={(m) => { setMonth(m); setIdx(0); }} />
          <Btn onClick={() => window.print()}><Icon name="print" size={15} /> طباعة / PDF</Btn>
        </div>
      </div>
      <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 10 }} className="no-print">شريحة {idx + 1} من {slides.length} — الملاحظات بتتحفظ تلقائيًا. «طباعة / PDF» بتطلع كل الشرائح ورا بعض.</div>
      {slides.map((s, i) => <div key={i} className={"slide" + (i === idx ? " active" : "")}>{s}</div>)}
      <div className="pager no-print" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginTop: 16 }}>
        <Btn kind="line" onClick={() => setIdx((i) => Math.max(0, i - 1))} style={{ opacity: idx === 0 ? .5 : 1 }}><Icon name="fwd" size={15} /> السابق</Btn>
        <div style={{ display: "flex", gap: 6 }}>{slides.map((_, i) => <button key={i} onClick={() => setIdx(i)} style={{ width: 10, height: 10, borderRadius: "50%", border: "none", cursor: "pointer", background: i === idx ? C.primary : C.line }} />)}</div>
        <Btn kind="line" onClick={() => setIdx((i) => Math.min(slides.length - 1, i + 1))} style={{ opacity: idx === slides.length - 1 ? .5 : 1 }}>التالي <Icon name="back" size={15} /></Btn>
      </div>
    </div>
  );
}

/* ===================== Team ===================== */
function Team({ data, update, month, setMonth }) {
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const save = (member) => { const exists = data.members.find((x) => x.id === member.id); update({ ...data, members: exists ? data.members.map((x) => (x.id === member.id ? member : x)) : [...data.members, member] }); setModal(null); };
  const remove = (id) => { if (!confirm("هتمسح الفرد ده وكل أرقامه. متأكد؟")) return; update({ ...data, members: data.members.filter((x) => x.id !== id), assignments: data.assignments.filter((a) => a.memberId !== id), kpis: data.kpis.filter((k) => k.memberId !== id) }); setSelected(null); };

  if (selected) { const mb = data.members.find((m) => m.id === selected); if (mb) return <MemberDetail data={data} member={mb} month={month} setMonth={setMonth} onBack={() => setSelected(null)} onEdit={() => setModal({ ...mb })} modal={modal} setModal={setModal} save={save} />; }
  const scores = useMemo(() => { const s = {}; teamScores(data, month).forEach((x) => (s[x.member.id] = x)); return s; }, [data, month]);
  return (
    <div>
      <Header title="الفريق" sub="كل أفراد الفريق ومستوياتهم والمشاريع المسؤولين عنها" right={<Btn onClick={() => setModal({ new: true })}><Icon name="userplus" size={16} /> إضافة فرد</Btn>} />
      {data.members.length === 0 ? (
        <Card><Empty icon="users" title="مفيش أفراد لسه" sub="ضيف أول عضو في الفريق." action={<Btn onClick={() => setModal({ new: true })}><Icon name="userplus" size={16} /> إضافة فرد</Btn>} /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 14 }}>
          {data.members.map((m) => {
            const sn = SENIORITY[m.seniority] || SENIORITY.mid, projects = data.assignments.filter((a) => a.memberId === m.id).length, sc = scores[m.id];
            return (
              <Card key={m.id} style={{ cursor: "pointer" }} onClick={() => setSelected(m.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                  <div style={{ width: 46, height: 46, borderRadius: "50%", background: C.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 16, flexShrink: 0 }}>{memberInitials(m.name)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 800, fontSize: 16 }}>{m.name}</div><div style={{ fontSize: 12.5, color: C.inkSoft }}>{ROLES[m.role] || m.role}</div></div>
                  <div style={{ display: "flex", gap: 4 }} onClick={(e) => e.stopPropagation()}><IconBtn onClick={() => setModal({ ...m })}><Icon name="pencil" size={15} /></IconBtn><IconBtn danger onClick={() => remove(m.id)}><Icon name="trash" size={15} /></IconBtn></div>
                </div>
                <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 12 }}><Pill color={sn.color}><Icon name="star" size={11} /> {sn.label}</Pill><Pill color={C.inkSoft}><Icon name="folder" size={11} /> {projects} مشروع</Pill></div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, color: C.inkSoft, fontWeight: 700, whiteSpace: "nowrap" }}>أداء {monthLabel(month).split(" ")[0]}</span><Bar pct={sc ? sc.score : 0} color={C.primary} /><span style={{ fontWeight: 800, color: C.primary, fontSize: 13, width: 32, textAlign: "left" }}>{sc ? sc.score : 0}</span></div>
              </Card>
            );
          })}
        </div>
      )}
      {modal && <MemberForm initial={modal.new ? null : modal} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function MemberDetail({ data, member, month, setMonth, onBack, onEdit, modal, setModal, save }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const sn = SENIORITY[member.seniority] || SENIORITY.mid;
  const agg = useMemo(() => memberAgg(data, member.id, month), [data, member, month]);
  const recs = data.kpis.filter((k) => k.memberId === member.id && k.month === month);
  const rows = recs.map((r) => ({ rec: r, project: data.projects.find((p) => p.id === r.projectId) })).filter((x) => x.project);
  const sc = useMemo(() => teamScores(data, month).find((x) => x.member.id === member.id), [data, month, member]);
  const sumA = sumMetrics(data)[0], pctA = pctMetrics(data)[0];
  const trend = useMemo(() => [...months].slice(0, 6).reverse().map((m) => { const a = memberAgg(data, member.id, m); return { name: monthLabel(m).split(" ")[0], s: sumA ? a[sumA.key] : 0, p: pctA ? +a[pctA.key].toFixed(1) : 0 }; }), [data, member, months, sumA, pctA]);
  return (
    <div>
      <div className="no-print" style={{ marginBottom: 14 }}><Btn kind="line" size="sm" onClick={onBack}><Icon name="back" size={15} /> رجوع للفريق</Btn></div>
      <Header title={member.name} sub={`${ROLES[member.role] || member.role} · ${sn.label}`} right={<><MonthPicker months={months} month={month} setMonth={setMonth} /><Btn kind="line" onClick={onEdit}><Icon name="pencil" size={15} /> تعديل</Btn></>} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 16, marginBottom: 16 }}>
        <Card>
          <CardTitle>بيانات</CardTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 13.5 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, color: C.inkSoft }}><Icon name="star" size={15} /> المستوى: <Pill color={sn.color}>{sn.label}</Pill></div>
            {member.email && <div style={{ display: "flex", alignItems: "center", gap: 8, color: C.inkSoft }}><Icon name="mail" size={15} /> {member.email}</div>}
            {member.phone && <div style={{ display: "flex", alignItems: "center", gap: 8, color: C.inkSoft }}><Icon name="phone" size={15} /> {member.phone}</div>}
            {member.joinDate && <div style={{ display: "flex", alignItems: "center", gap: 8, color: C.inkSoft }}><Icon name="calendar" size={15} /> انضم {member.joinDate}</div>}
            <div style={{ marginTop: 6, paddingTop: 12, borderTop: `1px solid ${C.line}` }}><div style={{ fontSize: 12, color: C.inkSoft, marginBottom: 4 }}>درجة الأداء (بعد الليفل)</div><div style={{ display: "flex", alignItems: "center", gap: 10 }}><Bar pct={sc ? sc.score : 0} color={C.primary} /><span style={{ fontWeight: 800, color: C.primary, fontSize: 16 }}>{sc ? sc.score : 0}</span></div><div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 4 }}>الأداء الخام: {sc ? sc.base : 0} · معامل {sn.label}: ×{(data.leniency[member.seniority] ?? 1)}</div></div>
          </div>
        </Card>
        <Card>
          <CardTitle>إجمالي {monthLabel(month)}</CardTitle>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>{data.metrics.map((m) => <Mini key={m.key} label={m.label} v={fmtMetric(m, agg[m.key])} />)}</div>
          <CardTitle>الاتجاه (آخر ٦ شهور)</CardTitle>
          <LineDual data={trend} series={[{ k: "s", color: C.primary, label: sumA?.label }, { k: "p", color: C.green, label: pctA?.label }]} height={180} />
          <Legend items={[{ color: C.primary, label: sumA?.label || "" }, { color: C.green, label: pctA?.label || "" }]} />
        </Card>
      </div>
      <Card>
        <CardTitle>الأداء لكل حساب — {monthLabel(month)}</CardTitle>
        {rows.length === 0 ? <Empty icon="trending" title="لا يوجد أداء مسجّل" sub="سجّل أرقام الشهر من تبويب الأداء." /> : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 680 }}>
              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الحساب</th><MetricHeadCells data={data} /></tr></thead>
              <tbody>
                {rows.map(({ rec, project }) => <tr key={rec.id} style={{ borderBottom: `1px solid ${C.line}` }}><td style={{ padding: "10px", fontWeight: 700 }}>{project.name}</td><MetricCells data={data} rec={rec} /></tr>)}
                <tr style={{ background: C.bg, fontWeight: 800 }}><td style={{ padding: "10px" }}>الإجمالي</td>{data.metrics.map((m) => <td key={m.key} style={{ padding: "10px" }}>{fmtMetric(m, agg[m.key])}</td>)}</tr>
              </tbody>
            </table>
          </div>
        )}
        {member.notes && <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 14, lineHeight: 1.7, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>{member.notes}</div>}
      </Card>
      {modal && !modal.new && <MemberForm initial={modal} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function MemberForm({ initial, onSave, onClose }) {
  const [f, setF] = useState(initial || { id: uid(), name: "", role: "social", seniority: "mid", email: "", phone: "", joinDate: "", notes: "" });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const submit = () => { if (!f.name.trim()) return; onSave(f); };
  return (
    <Modal title={initial ? "تعديل بيانات الفرد" : "فرد جديد"} onClose={onClose}>
      <Field label="الاسم *"><input style={inputStyle} value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="اسم الفرد" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="الدور"><select style={inputStyle} value={f.role} onChange={(e) => set("role", e.target.value)}>{Object.entries(ROLES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></Field>
        <Field label="المستوى (السينيوريتي)"><select style={inputStyle} value={f.seniority} onChange={(e) => set("seniority", e.target.value)}>{Object.entries(SENIORITY).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="الإيميل"><input style={inputStyle} value={f.email} onChange={(e) => set("email", e.target.value)} placeholder="email@team.com" /></Field>
        <Field label="الموبايل"><input style={inputStyle} value={f.phone} onChange={(e) => set("phone", e.target.value)} placeholder="01xxxxxxxxx" /></Field>
      </div>
      <Field label="تاريخ الانضمام"><input type="date" style={{ ...inputStyle, maxWidth: 200 }} value={f.joinDate} onChange={(e) => set("joinDate", e.target.value)} /></Field>
      <Field label="ملاحظات"><textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={f.notes} onChange={(e) => set("notes", e.target.value)} /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}><Btn onClick={submit}>حفظ</Btn><Btn kind="line" onClick={onClose}>إلغاء</Btn></div>
    </Modal>
  );
}

/* ===================== Performance ===================== */
function Performance({ data, month, setMonth, update }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const [modal, setModal] = useState(null);
  const saveKpi = (rec) => { const exists = data.kpis.find((k) => k.id === rec.id); update({ ...data, kpis: exists ? data.kpis.map((k) => (k.id === rec.id ? rec : k)) : [...data.kpis, rec] }); setModal(null); };
  const removeKpi = (id) => { if (!confirm("مسح السجل ده؟")) return; update({ ...data, kpis: data.kpis.filter((k) => k.id !== id) }); };
  const scores = useMemo(() => teamScores(data, month), [data, month]);
  const active = scores.filter((s) => s.count > 0);
  const chartData = active.map((s) => { const o = { name: s.member.name.split(" ")[0] }; data.metrics.forEach((m) => (o[m.key] = s[m.key])); return o; });
  const series = data.metrics.map((m, i) => ({ k: m.key, color: METRIC_COLORS[i % METRIC_COLORS.length], label: m.label, pct: m.pct }));
  return (
    <div>
      <Header title="الأداء و الـKPIs" sub="سجّل أرقام كل فرد على كل حساب — والدرجة بتتحسب حسب الليفل" right={<><MonthPicker months={months} month={month} setMonth={setMonth} /><Btn onClick={() => setModal({ new: true })}><Icon name="plus" size={16} /> تسجيل أداء</Btn></>} />
      {data.members.length === 0 || data.projects.length === 0 ? (
        <Card><Empty icon="trending" title="محتاج فريق ومشاريع الأول" sub="ضيف أعضاء ومشاريع عشان تبدأ تسجّل الأرقام." /></Card>
      ) : (
        <>
          <Card style={{ marginBottom: 16 }}>
            <CardTitle right={<Pill color={C.primary}>{monthLabel(month)}</Pill>}>مقارنة الأداء — كل المقاييس</CardTitle>
            {chartData.length ? <><Bars data={chartData} series={series} /><Legend items={series.map((s) => ({ color: s.color, label: s.label }))} /><div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 8, textAlign: "center" }}>كل مقياس متدرّج لأعلى قيمة فيه (عشان المقارنة العادلة بين الأعمدة).</div></> : <Empty icon="file" title="لا توجد بيانات" sub="سجّل أرقام للشهر ده." />}
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14, marginBottom: 16 }}>
            {active.map((s) => { const sn = SENIORITY[s.member.seniority] || SENIORITY.mid; return (
              <Card key={s.member.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div style={{ fontWeight: 800 }}>{s.member.name}</div><Pill color={sn.color}>{sn.label}</Pill></div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>{data.metrics.map((m) => <Mini key={m.key} label={m.label} v={fmtMetric(m, s[m.key])} />)}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 12, color: C.inkSoft, fontWeight: 700 }}>الدرجة</span><Bar pct={s.score} color={C.primary} /><span style={{ fontWeight: 800, color: C.primary, width: 32, textAlign: "left" }}>{s.score}</span></div>
              </Card>); })}
          </div>

          <Card>
            <CardTitle>سجلات الأداء — {monthLabel(month)}</CardTitle>
            {(() => { const recs = data.kpis.filter((k) => k.month === month); if (!recs.length) return <Empty icon="file" title="مفيش سجلات" sub="اضغط «تسجيل أداء»." />;
              return (
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 760 }}>
                    <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الفرد</th><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الحساب</th><MetricHeadCells data={data} /><th style={{ borderBottom: `1px solid ${C.line}` }}></th></tr></thead>
                    <tbody>{recs.map((k) => { const mb = data.members.find((m) => m.id === k.memberId), pj = data.projects.find((p) => p.id === k.projectId); return (
                      <tr key={k.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                        <td style={{ padding: "10px", fontWeight: 700 }}>{mb ? mb.name : "—"}</td><td style={{ padding: "10px" }}>{pj ? pj.name : "—"}</td><MetricCells data={data} rec={k} />
                        <td style={{ padding: "10px" }}><div style={{ display: "flex", gap: 4 }}><IconBtn onClick={() => setModal({ ...k })}><Icon name="pencil" size={14} /></IconBtn><IconBtn danger onClick={() => removeKpi(k.id)}><Icon name="trash" size={14} /></IconBtn></div></td>
                      </tr>); })}</tbody>
                  </table>
                </div>); })()}
          </Card>
        </>
      )}
      {modal && <KpiForm data={data} month={month} initial={modal.new ? null : modal} onSave={saveKpi} onClose={() => setModal(null)} />}
    </div>
  );
}

function KpiForm({ data, month, initial, onSave, onClose }) {
  const init = initial || { id: uid(), memberId: "", projectId: "", month };
  const [f, setF] = useState(() => { const base = { ...init }; data.metrics.forEach((m) => { if (base[m.key] == null) base[m.key] = ""; }); return base; });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const memberProjects = f.memberId ? data.assignments.filter((a) => a.memberId === f.memberId).map((a) => data.projects.find((p) => p.id === a.projectId)).filter(Boolean) : data.projects;
  const submit = () => { if (!f.memberId || !f.projectId) { alert("اختر الفرد والحساب."); return; } const rec = { id: f.id, memberId: f.memberId, projectId: f.projectId, month: f.month }; data.metrics.forEach((m) => (rec[m.key] = Number(f[m.key]) || 0)); onSave(rec); };
  return (
    <Modal wide title={initial ? "تعديل سجل أداء" : "تسجيل أداء"} onClose={onClose}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        <Field label="الفرد *"><select style={inputStyle} value={f.memberId} onChange={(e) => { set("memberId", e.target.value); set("projectId", ""); }}><option value="">اختر…</option>{data.members.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}</select></Field>
        <Field label="الحساب *"><select style={inputStyle} value={f.projectId} onChange={(e) => set("projectId", e.target.value)}><option value="">اختر…</option>{memberProjects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}</select>{f.memberId && memberProjects.length === 0 && <div style={{ fontSize: 11.5, color: C.amber, marginTop: 4 }}>الفرد ده مش متعيّن على أي مشروع.</div>}</Field>
        <Field label="الشهر"><input type="month" style={inputStyle} value={f.month} onChange={(e) => set("month", e.target.value)} /></Field>
      </div>
      <div style={{ fontSize: 12.5, fontWeight: 800, color: C.inkSoft, margin: "6px 0 10px" }}>المقاييس (تقدر تضيف مقاييس جديدة من «الإعدادات»)</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        {data.metrics.map((m) => <Field key={m.key} label={m.label}><input type="number" min="0" step="any" style={inputStyle} value={f[m.key]} onChange={(e) => set(m.key, e.target.value)} placeholder="0" /></Field>)}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}><Btn onClick={submit}>حفظ</Btn><Btn kind="line" onClick={onClose}>إلغاء</Btn></div>
    </Modal>
  );
}

/* ===================== Reports ===================== */
function Reports({ data, month, setMonth }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const scores = useMemo(() => teamScores(data, month), [data, month]);
  const active = scores.filter((s) => s.count > 0);
  const exportMembers = () => { const head = ["الفرد", "الدور", "المستوى", "عدد الحسابات", ...data.metrics.map((m) => m.label), "الأداء الخام", "الدرجة"]; const rows = [head, ...active.map((s) => [s.member.name, ROLES[s.member.role] || s.member.role, (SENIORITY[s.member.seniority] || {}).label, s.count, ...data.metrics.map((m) => Math.round((s[m.key] || 0) * 100) / 100), s.base, s.score])]; downloadCSV(`تقرير-الفريق-${month}.csv`, rows); };
  const exportDetailed = () => { const head = ["الفرد", "الحساب", "الشهر", ...data.metrics.map((m) => m.label)]; const rows = [head]; data.kpis.filter((k) => k.month === month).forEach((k) => { const mb = data.members.find((m) => m.id === k.memberId), pj = data.projects.find((p) => p.id === k.projectId); rows.push([mb ? mb.name : "—", pj ? pj.name : "—", k.month, ...data.metrics.map((m) => k[m.key] ?? 0)]); }); downloadCSV(`تفصيلي-${month}.csv`, rows); };
  return (
    <div>
      <Header title="التقارير" sub="ملخّصات شهرية جاهزة للتصدير والطباعة" right={<><MonthPicker months={months} month={month} setMonth={setMonth} /><Btn kind="line" onClick={() => window.print()}><Icon name="print" size={15} /> طباعة</Btn></>} />
      <div className="no-print" style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <Btn kind="ghost" onClick={exportMembers}><Icon name="download" size={15} /> تصدير ملخّص الفريق (CSV)</Btn>
        <Btn kind="ghost" onClick={exportDetailed}><Icon name="download" size={15} /> تصدير تفصيلي (فرد×حساب)</Btn>
      </div>
      <Card style={{ marginBottom: 16 }}>
        <CardTitle>ملخّص الفريق — {monthLabel(month)}</CardTitle>
        {active.length === 0 ? <Empty icon="report" title="لا توجد بيانات" sub="سجّل أرقام الشهر ده." /> : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 760 }}>
              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الفرد</th><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>المستوى</th><MetricHeadCells data={data} /><th style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}` }}>الدرجة</th></tr></thead>
              <tbody>{active.map((s) => { const sn = SENIORITY[s.member.seniority] || SENIORITY.mid; return (
                <tr key={s.member.id} style={{ borderBottom: `1px solid ${C.line}` }}><td style={{ padding: "10px", fontWeight: 700 }}>{s.member.name}</td><td style={{ padding: "10px" }}><Pill color={sn.color}>{sn.label}</Pill></td><MetricCells data={data} rec={s} /><td style={{ padding: "10px" }}><Pill color={C.primary}>{s.score}</Pill></td></tr>); })}</tbody>
            </table>
          </div>
        )}
      </Card>
      <Card>
        <CardTitle>تقرير الحسابات (تحقيق الأهداف) — {monthLabel(month)}</CardTitle>
        {data.projects.length === 0 ? <Empty icon="folder" title="مفيش مشاريع" sub="" /> : (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>{data.projects.map((p) => { const overall = projectOverall(data, p, month); const goals = p.goals || []; return (
            <div key={p.id} style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}><div style={{ fontWeight: 800, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>{p.name} <PlatformPills p={p} /></div>{overall != null ? <Pill color={achColor(overall)}>{overall}% — {achLabel(overall)}</Pill> : <Pill color={C.inkSoft}>بدون أهداف</Pill>}</div>
              {goals.length === 0 ? <div style={{ fontSize: 12.5, color: C.inkSoft }}>مفيش أهداف محددة.</div> : goals.map((g) => { const ga = goalAchievement(data, p, month, g); const withT = ga.per.filter((x) => x.target > 0); if (!withT.length) return null; return (
                <div key={g.id} style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: C.inkSoft, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}><Icon name="target" size={14} /> {g.name} {ga.overall != null && <Pill color={achColor(ga.overall)}>{ga.overall}%</Pill>}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 10 }}>{withT.map((x) => (
                    <div key={x.key}><div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 4 }}><span style={{ fontWeight: 700 }}>{x.label}</span><span style={{ color: C.inkSoft }}>{fmtMetric(x.metric, x.actual)}/{fmtMetric(x.metric, x.target)}</span></div><div style={{ display: "flex", alignItems: "center", gap: 8 }}><Bar pct={x.pct || 0} color={achColor(x.pct)} /><span style={{ width: 40, textAlign: "left", fontWeight: 800, fontSize: 12, color: achColor(x.pct) }}>{x.pct}%</span></div></div>))}</div>
                </div>); })}
            </div>); })}</div>
        )}
      </Card>
    </div>
  );
}

/* ===================== Settings ===================== */
function Settings({ data, update }) {
  const fileRef = useRef(null);
  const [mForm, setMForm] = useState(null);
  const slug = (label) => "m_" + Math.random().toString(36).slice(2, 7);
  const saveMetric = (m) => {
    const exists = data.metrics.find((x) => x.key === m.key);
    update({ ...data, metrics: exists ? data.metrics.map((x) => (x.key === m.key ? m : x)) : [...data.metrics, m] });
    setMForm(null);
  };
  const delMetric = (key) => { if (data.metrics.length <= 1) { alert("لازم يفضل مقياس واحد على الأقل."); return; } if (!confirm("هتشيل المقياس ده من كل الشاشات. الأرقام القديمة بتفضل متخزّنة بس مش هتتعرض. متأكد؟")) return; update({ ...data, metrics: data.metrics.filter((m) => m.key !== key) }); };
  const setLen = (k, v) => update({ ...data, leniency: { ...data.leniency, [k]: Number(v) || 0 } });
  const exportAll = () => downloadFile(`backup-${nowMonth()}.json`, JSON.stringify(data, null, 2), "application/json");
  const importAll = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => { try { const parsed = JSON.parse(r.result); if (!parsed.projects || !parsed.members) throw new Error("bad"); if (!confirm("هيستبدل كل البيانات الحالية بالنسخة دي. متأكد؟")) return; update(migrate(parsed)); alert("تم الاستيراد بنجاح."); } catch (err) { alert("الملف غير صالح."); } }; r.readAsText(file); e.target.value = ""; };
  const resetAll = () => { if (!confirm("هيمسح كل البيانات نهائيًا. متأكد؟")) return; update(emptyData()); };

  return (
    <div>
      <Header title="الإعدادات" sub="تحكّم في مقاييس الأداء، معاملات الليفل، والنسخ الاحتياطي" />

      <Card style={{ marginBottom: 16 }}>
        <CardTitle right={<Btn size="sm" onClick={() => setMForm({ new: true, key: slug(), label: "", agg: "sum", pct: false })}><Icon name="plus" size={14} /> مقياس جديد</Btn>}>مقاييس الأداء (KPIs مفتوحة)</CardTitle>
        <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 12, lineHeight: 1.7 }}>دي المقاييس اللي بتتسجّل لكل فرد على كل حساب. تقدر تضيف أو تشيل مقاييس حسب احتياج كل حساب. أي مقياس جديد بيظهر تلقائيًا في تسجيل الأداء، الأهداف، التقارير، والسلايدات.</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {data.metrics.map((m, i) => (
            <div key={m.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", border: `1px solid ${C.line}`, borderRadius: 10 }}>
              <span style={{ width: 26, height: 26, borderRadius: 8, background: (METRIC_COLORS[i % METRIC_COLORS.length]) + "22", color: METRIC_COLORS[i % METRIC_COLORS.length], display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, flexShrink: 0 }}>{i + 1}</span>
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 800, fontSize: 14 }}>{m.label}</div><div style={{ fontSize: 11.5, color: C.inkSoft }}>التجميع: {m.agg === "avg" ? "متوسط" : "إجمالي"}{m.pct ? " · نسبة مئوية %" : ""}</div></div>
              <IconBtn onClick={() => setMForm({ ...m })}><Icon name="pencil" size={14} /></IconBtn>
              <IconBtn danger onClick={() => delMetric(m.key)}><Icon name="trash" size={14} /></IconBtn>
            </div>))}
        </div>
      </Card>

      <Card style={{ marginBottom: 16 }}>
        <CardTitle>معاملات الليفل (الرحمة في التقييم)</CardTitle>
        <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 14, lineHeight: 1.7 }}>حجم الشغل والأرقام بتتحسب بنفس الوزن للكل. المعامل ده بيظبط التقييم حسب المستوى: لمّا الجونيور يجيب أرقام زي السينيور، بياخد درجة أعلى لأن المعامل بتاعه أكبر. <b>أكبر من ١ = رحمة أكتر (درجة أعلى)</b>، وأقل من ١ = تقييم أصرم.</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
          {Object.entries(SENIORITY).map(([k, v]) => (
            <div key={k} style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}><Pill color={v.color}><Icon name="star" size={11} /> {v.label}</Pill></div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 12.5, color: C.inkSoft, fontWeight: 700 }}>المعامل ×</span><input type="number" min="0" step="0.01" style={{ ...inputStyle, padding: "8px 10px" }} value={data.leniency[k] ?? 1} onChange={(e) => setLen(k, e.target.value)} /></div>
            </div>))}
        </div>
        <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 10 }}>الافتراضي: جونيور ×{DEFAULT_LENIENCY.junior} · ميد ×{DEFAULT_LENIENCY.mid} · سينيور ×{DEFAULT_LENIENCY.senior}. الدرجة النهائية بحد أقصى ١٠٠.</div>
      </Card>

      <Card>
        <CardTitle>النسخ الاحتياطي والبيانات</CardTitle>
        <div style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 14, lineHeight: 1.7 }}>البيانات متخزّنة على المتصفّح ده بس. اعمل نسخة احتياطية بانتظام، خصوصًا قبل ما تحدّث الملف على GitHub.</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Btn kind="ghost" onClick={exportAll}><Icon name="download" size={15} /> تنزيل نسخة احتياطية (JSON)</Btn>
          <Btn kind="line" onClick={() => fileRef.current && fileRef.current.click()}><Icon name="upload" size={15} /> استيراد نسخة</Btn>
          <input ref={fileRef} type="file" accept="application/json,.json" onChange={importAll} style={{ display: "none" }} />
          <Btn kind="line" onClick={() => update(sampleData())}><Icon name="sparkles" size={15} /> تحميل بيانات تجريبية</Btn>
          <Btn kind="line" style={{ color: C.rose, borderColor: C.rose + "55" }} onClick={resetAll}><Icon name="trash" size={15} /> مسح كل البيانات</Btn>
        </div>
      </Card>

      {mForm && <MetricForm initial={mForm.new ? null : mForm} draft={mForm} onSave={saveMetric} onClose={() => setMForm(null)} />}
    </div>
  );
}

function MetricForm({ initial, draft, onSave, onClose }) {
  const [f, setF] = useState(draft);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const submit = () => { if (!f.label.trim()) { alert("اكتب اسم المقياس."); return; } onSave({ key: f.key, label: f.label.trim(), agg: f.agg, pct: !!f.pct }); };
  return (
    <Modal title={initial ? "تعديل المقياس" : "مقياس أداء جديد"} onClose={onClose}>
      <Field label="اسم المقياس *"><input style={inputStyle} value={f.label} onChange={(e) => set("label", e.target.value)} placeholder="مثلاً: عدد الستوريز، التعليقات، المشاهدات…" /></Field>
      <Field label="طريقة التجميع عبر الحسابات">
        <select style={inputStyle} value={f.agg} onChange={(e) => set("agg", e.target.value)}><option value="sum">إجمالي (نجمع الأرقام) — مناسب للأعداد</option><option value="avg">متوسط — مناسب للنِسب والمعدلات</option></select>
      </Field>
      <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 700, cursor: "pointer", marginBottom: 14 }}>
        <input type="checkbox" checked={!!f.pct} onChange={(e) => set("pct", e.target.checked)} style={{ width: 17, height: 17 }} /> المقياس ده نسبة مئوية (يتعرض بعلامة %)
      </label>
      <div style={{ fontSize: 11.5, color: C.inkSoft, marginBottom: 14, lineHeight: 1.7 }}>النِسب (زي التفاعل والالتزام) خليها «متوسط» + «نسبة مئوية». الأعداد (زي المنشورات والوصول) خليها «إجمالي».</div>
      <div style={{ display: "flex", gap: 10 }}><Btn onClick={submit}>حفظ</Btn><Btn kind="line" onClick={onClose}>إلغاء</Btn></div>
    </Modal>
  );
}

/* ===================== mount ===================== */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
