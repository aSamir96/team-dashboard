  get(k) { try { return localStorage.getItem(k); } catch (e) { return _mem[k] ?? null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) { _mem[k] = v; } },

function loadData() { const v = store.get(STORE_KEY); if (v) { try { return JSON.parse(v); } catch (e) {} } return null; }

const uid = () => Math.random().toString(36).slice(2, 10);

const fmt = (n) => (n == null ? "—" : Number(n).toLocaleString("en-US"));
const fmtShort = (n) => { n = Number(n) || 0; const a = Math.abs(n); if (a >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M"; if (a >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "K"; return String(Math.round(n)); };
const fmtMetric = (m, v) => (m.pct ? (Math.round((Number(v) || 0) * 10) / 10) + "%" : fmt(Math.round(Number(v) || 0)));
const monthLabel = (m) => { if (!m) return ""; const [y, mo] = m.split("-"); const names = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"]; return `${names[+mo - 1]} ${y}`; };
const prevMonth = (m) => { const [y, mo] = m.split("-").map(Number); const d = new Date(y, mo - 1, 1); d.setMonth(d.getMonth() - 1); return d.toISOString().slice(0, 7); };
const allMonths = (data) => { const s = new Set(data.kpis.map((k) => k.month)); s.add(nowMonth()); return [...s].sort().reverse(); };
const primaryPlatform = (p) => (p.platforms && p.platforms[0]) || p.platform || "other";
const platformsLabel = (p) => (p.platforms || []).map((x) => PLATFORMS[x]?.label || x).join(" + ");
const assignedIdsFor = (data, pid) => data.assignments.filter((a) => a.projectId === pid).map((a) => a.memberId);

const sumMetrics = (data) => data.metrics.filter((m) => m.agg !== "avg");
const pctMetrics = (data) => data.metrics.filter((m) => m.pct);
const pctChange = (cur, prev) => { cur = Number(cur) || 0; prev = Number(prev) || 0; if (prev === 0) return cur === 0 ? 0 : null; return Math.round(((cur - prev) / prev) * 100); };

/* ===================== migration ===================== */
const emptyData = () => ({ projects: [], members: [], assignments: [], kpis: [], metrics: JSON.parse(JSON.stringify(DEFAULT_METRICS)), leniency: { ...DEFAULT_LENIENCY }, reportNotes: {} });
function migrate(d) {
  if (!d) return emptyData();
  d.metrics = (d.metrics && d.metrics.length ? d.metrics : JSON.parse(JSON.stringify(DEFAULT_METRICS))).map((m) => ({ agg: "sum", pct: false, ...m }));
  d.leniency = { ...DEFAULT_LENIENCY, ...(d.leniency || {}) };
  d.reportNotes = d.reportNotes || {};
  d.projects = (d.projects || []).map((p) => {
    const platforms = p.platforms && p.platforms.length ? p.platforms : (p.platform ? [p.platform] : ["instagram"]);
    let goals = p.goals;
    if (!goals) { const t = p.targets || {}; const tt = {}; Object.keys(t).forEach((k) => { if (k !== "content" && Number(t[k]) > 0) tt[k] = Number(t[k]); }); goals = Object.keys(tt).length ? [{ id: uid(), name: "الهدف الأساسي", targets: tt }] : []; }
    return { client: "", objective: "growth", startDate: "", priority: "med", ...p, platforms, links: p.links || [], goals };
  });
  d.members = (d.members || []).map((m) => ({ ...m, seniority: m.seniority === "lead" ? "senior" : (m.seniority || "mid") }));
  d.assignments = d.assignments || [];
  d.kpis = d.kpis || [];
  return d;
}

};
function Icon({ name, size = 18, color = "currentColor", style }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style} dangerouslySetInnerHTML={{ __html: ICONS[name] || "" }} />;
}

/* ===================== charts ===================== */
function LineDual({ data, series, height = 230 }) {
  if (!data.length) return null;
  const W = 620, H = height, P = { l: 26, r: 16, t: 16, b: 26 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b;
  const x = (i) => (data.length === 1 ? P.l + iw / 2 : P.l + i * iw / (data.length - 1));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      {[0, .25, .5, .75, 1].map((t, i) => <line key={i} x1={P.l} x2={W - P.r} y1={P.t + ih * t} y2={P.t + ih * t} stroke={C.line} />)}
      {series.map((s) => { const max = Math.max(1, ...data.map((d) => +d[s.k] || 0)); const pts = data.map((d, i) => `${x(i)},${P.t + ih - ((+d[s.k] || 0) / max) * ih}`).join(" "); return <polyline key={s.k} points={pts} fill="none" stroke={s.color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />; })}
      {series.map((s) => { const max = Math.max(1, ...data.map((d) => +d[s.k] || 0)); return data.map((d, i) => <circle key={s.k + i} cx={x(i)} cy={P.t + ih - ((+d[s.k] || 0) / max) * ih} r="3.5" fill={s.color}><title>{`${d.name} — ${s.label}: ${d[s.k]}`}</title></circle>); })}
      {data.map((d, i) => <text key={i} x={x(i)} y={H - 8} fontSize="12" fill={C.inkSoft} textAnchor="middle" fontFamily="Cairo">{d.name}</text>)}
    </svg>
  );
}
function Bars({ data, series, height = 260 }) {
  if (!data.length) return null;
  const W = 680, H = height, P = { l: 14, r: 14, t: 24, b: 34 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b, gW = iw / data.length;
  const bw = Math.min(22, Math.max(7, (gW - 16) / series.length));
  const maxes = {}; series.forEach((s) => (maxes[s.k] = Math.max(1, ...data.map((d) => +d[s.k] || 0))));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      <line x1={P.l} x2={W - P.r} y1={P.t + ih} y2={P.t + ih} stroke={C.line} />
      {data.map((d, gi) => { const gx = P.l + gi * gW + gW / 2, span = series.length * bw + (series.length - 1) * 4;
        return <g key={gi}>{series.map((s, si) => { const v = +d[s.k] || 0, hgt = (v / maxes[s.k]) * ih, bx = gx - span / 2 + si * (bw + 4), lab = s.pct ? (Math.round(v * 10) / 10) + "%" : fmtShort(v);
          return <g key={s.k}><rect x={bx} y={P.t + ih - hgt} width={bw} height={hgt} rx="4" fill={s.color}><title>{`${s.label}: ${v}`}</title></rect><text x={bx + bw / 2} y={P.t + ih - hgt - 4} fontSize="9.5" fill={C.ink} textAnchor="middle" fontFamily="Cairo">{lab}</text></g>; })}
          <text x={gx} y={H - 12} fontSize="12" fill={C.inkSoft} textAnchor="middle" fontFamily="Cairo">{d.name}</text></g>; })}
    </svg>
  );
}
function arc(cx, cy, r, ri, a0, a1) {
  const p = (rr, a) => [cx + rr * Math.cos(a), cy + rr * Math.sin(a)];
  const large = a1 - a0 > Math.PI ? 1 : 0;
  const [x0, y0] = p(r, a0), [x1, y1] = p(r, a1), [x2, y2] = p(ri, a1), [x3, y3] = p(ri, a0);
  return `M${x0} ${y0} A${r} ${r} 0 ${large} 1 ${x1} ${y1} L${x2} ${y2} A${ri} ${ri} 0 ${large} 0 ${x3} ${y3} Z`;
}
function Donut({ data, size = 200 }) {
  const total = data.reduce((a, d) => a + d.value, 0);
  if (!total) return null;
  const cx = size / 2, cy = size / 2, r = size / 2 - 6, ri = r * 0.6;
  if (data.length === 1) return <svg viewBox={`0 0 ${size} ${size}`} width="100%" style={{ maxHeight: 230, display: "block" }}><circle cx={cx} cy={cy} r={(r + ri) / 2} fill="none" stroke={data[0].color} strokeWidth={r - ri}><title>{`${data[0].name}: ${data[0].value}`}</title></circle></svg>;
  let a = -Math.PI / 2;
  return <svg viewBox={`0 0 ${size} ${size}`} width="100%" style={{ maxHeight: 230, display: "block" }}>{data.map((d, i) => { const ang = (d.value / total) * Math.PI * 2, a0 = a; a += ang; return <path key={i} d={arc(cx, cy, r, ri, a0, a0 + ang)} fill={d.color}><title>{`${d.name}: ${d.value}`}</title></path>; })}</svg>;
}
function HBars({ rows }) {
  if (!rows.length) return null;
  return <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>{rows.map((r, i) => (
    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <span style={{ width: 110, fontSize: 12.5, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }} title={r.name}>{r.name}</span>
      <div style={{ flex: 1, height: 14, borderRadius: 999, background: C.line, overflow: "hidden" }}><div style={{ width: `${Math.min(100, r.pct)}%`, height: "100%", background: r.color, borderRadius: 999 }} /></div>
      <span style={{ width: 52, textAlign: "left", fontWeight: 800, fontSize: 12.5, color: r.color }}>{r.label}</span>
    </div>))}</div>;
}

/* ===================== aggregation ===================== */
function aggregate(data, recs) {
  const out = { count: recs.length };
  data.metrics.forEach((mt) => { const vals = recs.map((r) => Number(r[mt.key]) || 0); const s = vals.reduce((a, b) => a + b, 0); out[mt.key] = mt.agg === "avg" ? (recs.length ? s / recs.length : 0) : s; });
  return out;
}
function memberAgg(data, memberId, month) { return aggregate(data, data.kpis.filter((k) => k.memberId === memberId && k.month === month)); }
function accountAgg(data, projectId, month) { return aggregate(data, data.kpis.filter((k) => k.projectId === projectId && k.month === month)); }
function teamScores(data, month) {
  const aggs = data.members.map((m) => ({ member: m, ...memberAgg(data, m.id, month) }));
  const maxes = {}; data.metrics.forEach((mt) => (maxes[mt.key] = Math.max(1, ...aggs.map((a) => a[mt.key] || 0))));
  const len = data.leniency || DEFAULT_LENIENCY;
  return aggs.map((a) => {
    const base = a.count ? data.metrics.reduce((s, mt) => s + ((a[mt.key] || 0) / maxes[mt.key]) * 100, 0) / (data.metrics.length || 1) : 0;
    const factor = len[a.member.seniority] ?? 1;
    return { ...a, base: Math.round(base), score: a.count ? Math.min(100, Math.round(base * factor)) : 0 };
  }).sort((x, y) => y.score - x.score);
}
function goalAchievement(data, project, month, goal) {
  const act = accountAgg(data, project.id, month); const t = goal.targets || {};
  const per = data.metrics.map((mt) => { const actual = act[mt.key] || 0, target = Number(t[mt.key]) || 0; const pct = target > 0 ? Math.round((actual / target) * 100) : null; return { key: mt.key, label: mt.label, metric: mt, actual, target, pct }; });
  const withT = per.filter((x) => x.pct != null);
  const overall = withT.length ? Math.round(withT.reduce((a, x) => a + Math.min(100, x.pct), 0) / withT.length) : null;
  return { per, overall, count: act.count };
}
function projectOverall(data, project, month) {
  const gs = (project.goals || []).map((g) => goalAchievement(data, project, month, g).overall).filter((v) => v != null);
  return gs.length ? Math.round(gs.reduce((a, b) => a + b, 0) / gs.length) : null;
}
function achColor(pct) { if (pct == null) return C.inkSoft; if (pct >= 100) return C.green; if (pct >= 70) return C.amber; return C.rose; }
function achLabel(pct) { if (pct == null) return "بدون هدف"; if (pct >= 100) return "فوق الهدف"; if (pct >= 70) return "على الطريق"; return "تحت الهدف"; }
function deltaColor(pct) { if (pct == null || pct === 0) return C.inkSoft; return pct > 0 ? C.green : C.rose; }

function downloadFile(filename, content, type) {
  try { const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
  catch (e) { alert("تعذّر التنزيل في هذه البيئة. جرّب من اللينك على GitHub."); }
}
function downloadCSV(filename, rows) {
  const csv = rows.map((r) => r.map((c) => { const s = String(c ?? ""); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",")).join("\n");
  downloadFile(filename, "\uFEFF" + csv, "text/csv;charset=utf-8;");
}

function Btn({ children, onClick, kind = "primary", size = "md", style, className, ...rest }) {
  const base = { border: "none", borderRadius: 10, cursor: "pointer", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 6 };
  const sizes = { md: { padding: "9px 16px", fontSize: 14 }, sm: { padding: "6px 11px", fontSize: 13 } };
  const kinds = { primary: { background: C.primary, color: "#fff" }, ghost: { background: C.primarySoft, color: C.primary }, line: { background: "#fff", color: C.ink, border: `1px solid ${C.line}` } };
  return <button className={className} onClick={onClick} style={{ ...base, ...sizes[size], ...kinds[kind], ...style }} {...rest}>{children}</button>;
}
function Field({ label, children }) { return <label style={{ display: "block", marginBottom: 14 }}><span style={{ display: "block", fontSize: 13, fontWeight: 700, color: C.inkSoft, marginBottom: 6 }}>{label}</span>{children}</label>; }
const inputStyle = { width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 10, border: `1px solid ${C.line}`, fontSize: 14, color: C.ink, background: "#fff", outline: "none" };
function Modal({ title, onClose, children, wide }) {
  return <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#14162B66", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", zIndex: 50, overflowY: "auto" }}>

        <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", color: C.inkSoft, display: "flex" }}><Icon name="x" size={20} /></button>
      </div>
      <div style={{ padding: 22 }}>{children}</div>

}
function Pill({ color, children }) { return <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 700, color, background: color + "1A", padding: "3px 9px", borderRadius: 999 }}>{children}</span>; }
function Empty({ icon, title, sub, action }) {

}
function Card({ children, style, onClick }) { return <div onClick={onClick} style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 16, padding: 18, ...style }}>{children}</div>; }
function CardTitle({ children, right }) { return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 8, flexWrap: "wrap" }}><h3 style={{ margin: 0, fontSize: 15.5, color: C.ink }}>{children}</h3>{right}</div>; }
function IconBtn({ children, onClick, danger }) { return <button onClick={onClick} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.line}`, background: "#fff", color: danger ? C.rose : C.inkSoft, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{children}</button>; }
function Header({ title, sub, right }) {

    <div><h1 style={{ margin: 0, fontSize: 24, fontWeight: 800 }}>{title}</h1><div style={{ color: C.inkSoft, fontSize: 14, marginTop: 3 }}>{sub}</div></div>
    <div className="no-print" style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>{right}</div>

}
function MonthPicker({ months, month, setMonth }) { return <select value={month} onChange={(e) => setMonth(e.target.value)} style={{ ...inputStyle, width: "auto", fontWeight: 700, cursor: "pointer", paddingInline: 14 }}>{months.map((m) => <option key={m} value={m}>{monthLabel(m)}</option>)}</select>; }
function Legend({ items }) { return <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>{items.map((it, i) => <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12.5, color: C.inkSoft, fontWeight: 700 }}><span style={{ width: 12, height: 12, borderRadius: 4, background: it.color }} />{it.label}</span>)}</div>; }
function Bar({ pct, color, height = 8 }) { return <div style={{ height, borderRadius: 999, background: C.line, overflow: "hidden", flex: 1 }}><div style={{ width: `${Math.min(100, Math.max(0, pct))}%`, height: "100%", background: color }} /></div>; }
function Mini({ label, v }) { return <div style={{ background: C.bg, borderRadius: 10, padding: "8px 10px", flex: 1, minWidth: 80 }}><div style={{ fontSize: 11.5, color: C.inkSoft }}>{label}</div><div style={{ fontWeight: 800, fontSize: 15 }}>{v}</div></div>; }
function Avatars({ members, max = 4 }) {
  const shown = members.slice(0, max), extra = members.length - shown.length;
  if (!members.length) return <span style={{ fontSize: 12.5, color: C.inkSoft }}>لا أحد بعد</span>;
  return <div style={{ display: "flex" }}>
    {shown.map((m, i) => <div key={m.id} title={m.name} style={{ width: 28, height: 28, borderRadius: "50%", background: C.primary, color: "#fff", fontSize: 11, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid #fff", marginRight: i ? -9 : 0 }}>{memberInitials(m.name)}</div>)}
    {extra > 0 && <div style={{ width: 28, height: 28, borderRadius: "50%", background: C.line, color: C.inkSoft, fontSize: 11, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid #fff", marginRight: -9 }}>+{extra}</div>}
  </div>;
}
function PlatformPills({ p }) { return <>{(p.platforms || []).map((pf) => { const pl = PLATFORMS[pf] || PLATFORMS.other; return <Pill key={pf} color={pl.color}>{pl.label}</Pill>; })}</>; }
function Delta({ pct }) { if (pct == null) return <Pill color={C.inkSoft}>جديد</Pill>; const c = deltaColor(pct); return <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontWeight: 800, fontSize: 13, color: c }}><Icon name={pct > 0 ? "up" : pct < 0 ? "down" : "fwd"} size={13} />{pct > 0 ? "+" : ""}{pct}%</span>; }

function MetricHeadCells({ data }) { return <>{data.metrics.map((m) => <th key={m.key} style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" }}>{m.label}</th>)}</>; }

/* ===================== Dashboard ===================== */
function Dashboard({ data, month, setMonth, update, setTab }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const totals = useMemo(() => aggregate(data, data.kpis.filter((k) => k.month === month)), [data, month]);
  const sums = sumMetrics(data), pcts = pctMetrics(data);
  const sumA = sums[0], sumB = sums[1], pctA = pcts[0];
  const byPlatform = useMemo(() => { if (!sumA) return []; const map = {}; data.kpis.filter((k) => k.month === month).forEach((k) => { const p = data.projects.find((x) => x.id === k.projectId); const key = p ? primaryPlatform(p) : "other"; map[key] = (map[key] || 0) + (Number(k[sumA.key]) || 0); }); return Object.entries(map).map(([k, v]) => ({ name: PLATFORMS[k]?.label || k, value: v, color: PLATFORMS[k]?.color || C.inkSoft })); }, [data, month, sumA]);
  const scores = useMemo(() => teamScores(data, month), [data, month]);
  const top = scores.filter((s) => s.count > 0).slice(0, 5);
  const trend = useMemo(() => [...months].slice(0, 6).reverse().map((m) => { const a = aggregate(data, data.kpis.filter((k) => k.month === m)); return { name: monthLabel(m).split(" ")[0], s: sumA ? a[sumA.key] : 0, p: pctA ? +a[pctA.key].toFixed(1) : 0 }; }), [data, months, sumA, pctA]);
  const acctPerf = useMemo(() => data.projects.map((p) => ({ p, overall: projectOverall(data, p, month), agg: accountAgg(data, p.id, month) })).filter((r) => r.agg.count > 0), [data, month]);
  const acctRank = [...acctPerf].filter((r) => r.overall != null).sort((a, b) => b.overall - a.overall).map((r) => ({ name: r.p.name, pct: r.overall, label: r.overall + "%", color: achColor(r.overall) }));
  const topByMetric = sumA ? [...acctPerf].sort((a, b) => (b.agg[sumA.key] || 0) - (a.agg[sumA.key] || 0)).slice(0, 6) : [];
  const maxMetric = Math.max(1, ...topByMetric.map((r) => r.agg[sumA?.key] || 0));
  const needAttention = acctPerf.filter((r) => r.overall != null && r.overall < 70);
  const isEmpty = !data.projects.length && !data.members.length;

  return (
    <div>
      <Header title="لوحة التحكم" sub="كل أرقام الفريق في مكان واحد" right={<MonthPicker months={months} month={month} setMonth={setMonth} />} />
      {isEmpty ? (
        <Card><Empty icon="sparkles" title="ابدأ ببناء مساحتك" sub="ضيف مشاريعك وفريقك، أو جرّب ببيانات جاهزة." action={<div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}><Btn onClick={() => update(sampleData())}><Icon name="sparkles" size={16} /> تجربة ببيانات جاهزة</Btn><Btn kind="line" onClick={() => setTab("projects")}><Icon name="plus" size={16} /> ضيف أول مشروع</Btn></div>} /></Card>
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(165px, 1fr))", gap: 14, marginBottom: 16 }}>
            {stat("أفراد الفريق", fmt(data.members.length), "users", C.primary)}
            {stat("مشاريع / حسابات", fmt(data.projects.length), "folder", C.rose)}
            {sumA && stat(sumA.label + " (الشهر)", fmtShort(totals[sumA.key]), "file", C.amber)}
            {pctA && stat("متوسط " + pctA.label.replace(" %", ""), (totals[pctA.key]).toFixed(1) + "%", "heart", C.green)}
            {sumB && stat(sumB.label + " (الشهر)", fmtShort(totals[sumB.key]), "userplus", "#8254E5")}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1.35fr 1fr", gap: 16, marginBottom: 16 }}>
            <Card><CardTitle>الاتجاه العام (آخر ٦ شهور)</CardTitle><LineDual data={trend} series={[{ k: "s", color: C.primary, label: sumA?.label }, { k: "p", color: C.green, label: pctA?.label }]} /><Legend items={[{ color: C.primary, label: sumA?.label || "" }, { color: C.green, label: pctA?.label || "" }]} /></Card>
            <Card><CardTitle>{sumA?.label} حسب المنصّة</CardTitle>{byPlatform.length ? <Donut data={byPlatform} /> : <Empty icon="file" title="لا توجد بيانات" sub="سجّل KPIs للشهر ده." />}<div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10, justifyContent: "center" }}>{byPlatform.map((e, i) => <Pill key={i} color={e.color}>{e.name} · {fmtShort(e.value)}</Pill>)}</div></Card>

            {top.length ? <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{top.map((s, i) => { const sn = SENIORITY[s.member.seniority] || SENIORITY.mid; return (
