/* ===================== charts ===================== */
function LineDual({ data, series, height = 230 }) {
  if (!data.length) return null;
  const W = 620, H = height, P = { l: 26, r: 16, t: 16, b: 26 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b;
  const x = (i) => (data.length === 1 ? P.l + iw / 2 : P.l + i * iw / (data.length - 1));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      {[0, .25, .5, .75, 1].map((t, i) => <line key={i} x1={P.l} x2={W - P.r} y1={P.t + ih * t} y2={P.t + ih * t} stroke={C.line} />)}
      {series.map((s) => { const max = Math.max(1, ...data.map((d) => +d[s.k] || 0)); const pts = data.map((d, i) => `${x(i)},${P.t + ih - ((+d[s.k] || 0) / max) * ih}`).join(" "); return <polyline key={s.k} points={pts} fill="none" stroke={s.color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />; })}
      {series.map((s) => { const max = Math.max(1, ...data.map((d) => +d[s.k] || 0)); return data.map((d, i) => <circle key={s.k + i} cx={x(i)} cy={P.t + ih - ((+d[s.k] || 0) / max) * ih} r="3.5" fill={s.color}><title>{`${d.name} — ${s.label}: ${d[s.k]}`}</title></circle>); })}
      {data.map((d, i) => <text key={i} x={x(i)} y={H - 8} fontSize="12" fill={C.inkSoft} textAnchor="middle" fontFamily="Cairo">{d.name}</text>)}
    </svg>
  );
}
function Bars({ data, series, height = 250 }) {
  if (!data.length) return null;
  const W = 640, H = height, P = { l: 14, r: 14, t: 24, b: 30 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b, gW = iw / data.length;
  const bw = Math.min(26, (gW - 18) / series.length);
  const maxes = {}; series.forEach((s) => (maxes[s.k] = Math.max(1, ...data.map((d) => +d[s.k] || 0))));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      <line x1={P.l} x2={W - P.r} y1={P.t + ih} y2={P.t + ih} stroke={C.line} />
      {data.map((d, gi) => { const gx = P.l + gi * gW + gW / 2, span = series.length * bw + (series.length - 1) * 6;
        return <g key={gi}>{series.map((s, si) => { const v = +d[s.k] || 0, hgt = (v / maxes[s.k]) * ih, bx = gx - span / 2 + si * (bw + 6); return <g key={s.k}><rect x={bx} y={P.t + ih - hgt} width={bw} height={hgt} rx="5" fill={s.color} /><text x={bx + bw / 2} y={P.t + ih - hgt - 5} fontSize="11" fill={C.ink} textAnchor="middle" fontFamily="Cairo">{v}</text></g>; })}<text x={gx} y={H - 10} fontSize="12" fill={C.inkSoft} textAnchor="middle" fontFamily="Cairo">{d.name}</text></g>; })}
    </svg>
  );
}
function arc(cx, cy, r, ri, a0, a1) {
  const p = (rr, a) => [cx + rr * Math.cos(a), cy + rr * Math.sin(a)];
  const large = a1 - a0 > Math.PI ? 1 : 0;
  const [x0, y0] = p(r, a0), [x1, y1] = p(r, a1), [x2, y2] = p(ri, a1), [x3, y3] = p(ri, a0);
  return `M${x0} ${y0} A${r} ${r} 0 ${large} 1 ${x1} ${y1} L${x2} ${y2} A${ri} ${ri} 0 ${large} 0 ${x3} ${y3} Z`;
}
function Donut({ data, size = 200 }) {
  const total = data.reduce((a, d) => a + d.value, 0);
  if (!total) return null;
  const cx = size / 2, cy = size / 2, r = size / 2 - 6, ri = r * 0.6;
  if (data.length === 1) return <svg viewBox={`0 0 ${size} ${size}`} width="100%" style={{ maxHeight: 230, display: "block" }}><circle cx={cx} cy={cy} r={(r + ri) / 2} fill="none" stroke={data[0].color} strokeWidth={r - ri}><title>{`${data[0].name}: ${data[0].value}`}</title></circle></svg>;
  let a = -Math.PI / 2;
  return <svg viewBox={`0 0 ${size} ${size}`} width="100%" style={{ maxHeight: 230, display: "block" }}>{data.map((d, i) => { const ang = (d.value / total) * Math.PI * 2, a0 = a; a += ang; return <path key={i} d={arc(cx, cy, r, ri, a0, a0 + ang)} fill={d.color}><title>{`${d.name}: ${d.value}`}</title></path>; })}</svg>;
}

/* ===================== atoms ===================== */
function Btn({ children, onClick, kind = "primary", size = "md", style, className, ...rest }) {
  const base = { border: "none", borderRadius: 10, cursor: "pointer", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 6 };
  const sizes = { md: { padding: "9px 16px", fontSize: 14 }, sm: { padding: "6px 11px", fontSize: 13 } };
  const kinds = { primary: { background: C.primary, color: "#fff" }, ghost: { background: C.primarySoft, color: C.primary }, line: { background: "#fff", color: C.ink, border: `1px solid ${C.line}` } };
  return <button className={className} onClick={onClick} style={{ ...base, ...sizes[size], ...kinds[kind], ...style }} {...rest}>{children}</button>;
}
function Field({ label, children }) { return <label style={{ display: "block", marginBottom: 14 }}><span style={{ display: "block", fontSize: 13, fontWeight: 700, color: C.inkSoft, marginBottom: 6 }}>{label}</span>{children}</label>; }

function CardTitle({ children, right }) { return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 8, flexWrap: "wrap" }}><h3 style={{ margin: 0, fontSize: 15.5, color: C.ink }}>{children}</h3>{right}</div>; }
function IconBtn({ children, onClick, danger }) { return <button onClick={onClick} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.line}`, background: "#fff", color: danger ? C.rose : C.inkSoft, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{children}</button>; }

function Legend({ items }) { return <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>{items.map((it, i) => <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12.5, color: C.inkSoft, fontWeight: 700 }}><span style={{ width: 12, height: 12, borderRadius: 4, background: it.color }} />{it.label}</span>)}</div>; }

function PlatformPills({ p }) { return <>{(p.platforms || []).map((pf) => { const pl = PLATFORMS[pf] || PLATFORMS.other; return <Pill key={pf} color={pl.color}>{pl.label}</Pill>; })}</>; }

/* ===================== aggregation ===================== */
function memberAgg(data, memberId, month) {
  const recs = data.kpis.filter((k) => k.memberId === memberId && k.month === month);
  const sum = (f) => recs.reduce((a, r) => a + (Number(r[f]) || 0), 0);
  const avg = (f) => (recs.length ? sum(f) / recs.length : 0);
  return { posts: sum("posts"), content: sum("content"), reach: sum("reach"), followers: sum("followers"), engagement: avg("engagement"), onTime: avg("onTime"), count: recs.length };
}
function teamScores(data, month) {
  const aggs = data.members.map((m) => ({ member: m, ...memberAgg(data, m.id, month) }));
  const maxes = {}; METRIC_KEYS.forEach((k) => (maxes[k] = Math.max(1, ...aggs.map((a) => a[k]))));
  return aggs.map((a) => {
    const w = data.weights[a.member.seniority] || data.weights.mid || DEFAULT_WEIGHTS.mid;
    const wsum = METRIC_KEYS.reduce((s, k) => s + (+w[k] || 0), 0) || 1;
    const score = a.count ? Math.round(METRIC_KEYS.reduce((s, k) => s + (+w[k] || 0) * ((a[k] / maxes[k]) * 100), 0) / wsum) : 0;
    return { ...a, score };
  }).sort((x, y) => y.score - x.score);
}
function projectAchievement(data, project, month) {
  const recs = data.kpis.filter((k) => k.projectId === project.id && k.month === month);
  const sum = (f) => recs.reduce((a, r) => a + (+r[f] || 0), 0);
  const avg = (f) => (recs.length ? sum(f) / recs.length : 0);
  const actuals = { posts: sum("posts"), content: sum("content"), reach: sum("reach"), followers: sum("followers"), engagement: avg("engagement"), onTime: avg("onTime") };
  const t = project.targets || {};
  const perMetric = METRICS.map((mt) => { const actual = actuals[mt.key], target = +t[mt.key] || 0; const pct = target > 0 ? Math.round((actual / target) * 100) : null; return { key: mt.key, label: mt.label, actual, target, pct }; });
  const withT = perMetric.filter((x) => x.pct != null);
  const overall = withT.length ? Math.round(withT.reduce((a, x) => a + Math.min(100, x.pct), 0) / withT.length) : null;
  return { actuals, perMetric, overall, count: recs.length };
}
function achColor(pct) { if (pct == null) return C.inkSoft; if (pct >= 100) return C.green; if (pct >= 70) return C.amber; return C.rose; }
function achLabel(pct) { if (pct == null) return "بدون هدف"; if (pct >= 100) return "فوق الهدف"; if (pct >= 70) return "على الطريق"; return "تحت الهدف"; }

function downloadFile(filename, content, type) {
  try { const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
  catch (e) { alert("تعذّر التنزيل في هذه البيئة. جرّب من اللينك على GitHub."); }
}
function downloadCSV(filename, rows) {
  const csv = rows.map((r) => r.map((c) => { const s = String(c ?? ""); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",")).join("\n");
  downloadFile(filename, "\uFEFF" + csv, "text/csv;charset=utf-8;");
}

/* ===================== Dashboard ===================== */

  const byPlatform = useMemo(() => { const map = {}; data.kpis.filter((k) => k.month === month).forEach((k) => { const p = data.projects.find((x) => x.id === k.projectId); const key = p ? primaryPlatform(p) : "other"; map[key] = (map[key] || 0) + (Number(k.posts) || 0); }); return Object.entries(map).map(([k, v]) => ({ name: PLATFORMS[k]?.label || k, value: v, color: PLATFORMS[k]?.color || C.inkSoft })); }, [data, month]);
  const scores = useMemo(() => teamScores(data, month), [data, month]);

  const trend = useMemo(() => [...months].slice(0, 6).reverse().map((m) => { const recs = data.kpis.filter((k) => k.month === m); const eng = recs.length ? recs.reduce((a, r) => a + (+r.engagement || 0), 0) / recs.length : 0; return { name: monthLabel(m).split(" ")[0], posts: recs.reduce((a, r) => a + (+r.posts || 0), 0), eng: +eng.toFixed(1) }; }), [data.kpis, months]);

            {stat("أفراد الفريق", fmt(data.members.length), "users", C.primary)}{stat("مشاريع / حسابات", fmt(data.projects.length), "folder", C.rose)}
            {stat("منشورات الشهر", fmt(totals.posts), "file", C.amber)}{stat("متوسط التفاعل", totals.engagement.toFixed(1) + "%", "heart", C.green)}{stat("نمو المتابعين", fmt(totals.followers), "userplus", "#8254E5")}
          </div>

/* ===================== Projects ===================== */
function Projects({ data, update, month, setMonth }) {
  const [modal, setModal] = useState(null);

  const [selected, setSelected] = useState(null);
  const save = ({ project, memberIds }) => {
    const exists = data.projects.find((x) => x.id === project.id);
    const projects = exists ? data.projects.map((x) => (x.id === project.id ? project : x)) : [...data.projects, project];
    let assignments = data.assignments.filter((a) => a.projectId !== project.id);
    (memberIds || []).forEach((mid) => assignments.push({ id: uid(), memberId: mid, projectId: project.id }));
    update({ ...data, projects, assignments }); setModal(null);
  };
  const remove = (id) => { if (!confirm("هتمسح المشروع ده وكل البيانات المرتبطة بيه. متأكد؟")) return; update({ ...data, projects: data.projects.filter((x) => x.id !== id), assignments: data.assignments.filter((a) => a.projectId !== id), kpis: data.kpis.filter((k) => k.projectId !== id) }); setSelected(null); };

  const months = useMemo(() => allMonths(data), [data.kpis]);
  const pr = PRIORITIES[project.priority] || PRIORITIES.med, ach = projectAchievement(data, project, month);
  const teamRows = assignedIdsFor(data, project.id).map((id) => { const m = data.members.find((x) => x.id === id); if (!m) return null; const rec = data.kpis.find((k) => k.memberId === m.id && k.projectId === project.id && k.month === month); return { member: m, rec }; }).filter(Boolean);
  const trend = [...months].slice(0, 6).reverse().map((mn) => { const recs = data.kpis.filter((k) => k.projectId === project.id && k.month === mn); const eng = recs.length ? recs.reduce((a, r) => a + (+r.engagement || 0), 0) / recs.length : 0; return { name: monthLabel(mn).split(" ")[0], posts: recs.reduce((a, r) => a + (+r.posts || 0), 0), eng: +eng.toFixed(1) }; });
  return (
    <div>
      <div className="no-print" style={{ marginBottom: 14 }}><Btn kind="line" size="sm" onClick={onBack}><Icon name="back" size={15} /> رجوع للمشاريع</Btn></div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
        <PlatformPills p={project} /><Pill color={C.inkSoft}>{project.type === "project" ? "بروجكت" : "حساب"}</Pill><Pill color={C.primary}>{OBJECTIVES[project.objective] || "—"}</Pill>
        <Pill color={pr.color}>أولوية {pr.label}</Pill><Pill color={project.status === "active" ? C.green : C.amber}>{project.status === "active" ? "نشط" : "متوقف"}</Pill>
        {project.startDate && <Pill color={C.inkSoft}><Icon name="calendar" size={12} /> بدأ {project.startDate}</Pill>}
      </div>
      {project.links && project.links.length > 0 && (
        <Card style={{ marginBottom: 16, padding: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 800, color: C.inkSoft, marginBottom: 8 }}>الروابط</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{project.links.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 700, textDecoration: "none", background: C.bg, padding: "7px 12px", borderRadius: 999 }}><Icon name="globe" size={14} /> {l.label || l.url}</a>)}</div>
        </Card>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 16, marginBottom: 16 }}>
        <Card>
          <CardTitle right={ach.overall != null ? <Pill color={achColor(ach.overall)}>{ach.overall}% — {achLabel(ach.overall)}</Pill> : null}>الأهداف × الفعلي — {monthLabel(month)}</CardTitle>
          {ach.perMetric.every((x) => x.target === 0) ? <Empty icon="target" title="مفيش أهداف محددة" sub="اضغط «تعديل» وحدّد أهداف شهرية." /> : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>{ach.perMetric.map((x) => (
              <div key={x.key}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}><span style={{ fontWeight: 700 }}>{x.label}</span><span style={{ color: C.inkSoft }}>{metricVal(x.key, x.actual)}{x.target ? ` / هدف ${metricVal(x.key, x.target)}` : ""}</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><Bar pct={x.pct == null ? 0 : x.pct} color={achColor(x.pct)} /><span style={{ width: 44, textAlign: "left", fontWeight: 800, fontSize: 13, color: achColor(x.pct) }}>{x.pct == null ? "—" : x.pct + "%"}</span></div>
              </div>))}</div>
          )}
        </Card>
        <Card><CardTitle>اتجاه المشروع</CardTitle><LineDual data={trend} series={[{ k: "posts", color: C.primary, label: "منشورات" }, { k: "eng", color: C.green, label: "تفاعل %" }]} height={200} /><Legend items={[{ color: C.primary, label: "منشورات" }, { color: C.green, label: "تفاعل %" }]} /></Card>
      </div>
      <Card>
        <CardTitle>الفريق على المشروع ({teamRows.length})</CardTitle>
        {teamRows.length === 0 ? <Empty icon="users" title="مفيش حد متعيّن" sub="اضغط «تعديل» وحدّد الفريق." /> : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 700 }}>
              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}>{["الفرد", "المستوى", "منشورات", "محتوى", "تفاعل", "وصول", "متابعين +", "التزام"].map((h, i) => <th key={i} style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{teamRows.map(({ member, rec }) => { const sn = SENIORITY[member.seniority] || SENIORITY.mid; return (
                <tr key={member.id} style={{ borderBottom: `1px solid ${C.line}` }}>

                  {rec ? <><td style={{ padding: "10px" }}>{fmt(rec.posts)}</td><td style={{ padding: "10px" }}>{fmt(rec.content)}</td><td style={{ padding: "10px" }}>{rec.engagement}%</td><td style={{ padding: "10px" }}>{fmt(rec.reach)}</td><td style={{ padding: "10px" }}>{fmt(rec.followers)}</td><td style={{ padding: "10px" }}>{rec.onTime}%</td></> : <td colSpan={6} style={{ padding: "10px", color: C.inkSoft }}>لم يُسجّل أداء هذا الشهر</td>}
                </tr>); })}</tbody>
            </table>
          </div>
        )}
        {project.notes && <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 14, lineHeight: 1.7, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>{project.notes}</div>}
      </Card>
      {modal && !modal.new && <ProjectForm initial={modal} members={data.members} assignedIds={assignedIdsFor(data, modal.id)} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function ProjectForm({ initial, members, assignedIds, onSave, onClose }) {
  const [f, setF] = useState(initial ? { ...initial, platforms: initial.platforms || [], links: initial.links || [] } : { id: uid(), name: "", platforms: ["instagram"], type: "account", handle: "", status: "active", client: "", objective: "growth", startDate: "", priority: "med", links: [], targets: emptyTargets(), notes: "" });
  const [memberIds, setMemberIds] = useState(assignedIds || []);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const setT = (k, v) => setF((p) => ({ ...p, targets: { ...p.targets, [k]: v === "" ? 0 : Number(v) } }));
  const togglePlatform = (k) => setF((p) => ({ ...p, platforms: p.platforms.includes(k) ? p.platforms.filter((x) => x !== k) : [...p.platforms, k] }));
  const toggleMember = (id) => setMemberIds((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));
  const setLink = (i, key, val) => setF((p) => { const links = [...p.links]; links[i] = { ...links[i], [key]: val }; return { ...p, links }; });
  const addLink = () => setF((p) => ({ ...p, links: [...p.links, { label: "", url: "" }] }));
  const delLink = (i) => setF((p) => ({ ...p, links: p.links.filter((_, j) => j !== i) }));
  const submit = () => { if (!f.name.trim()) return; if (!f.platforms.length) { alert("اختر منصّة واحدة على الأقل."); return; } onSave({ project: { ...f, links: f.links.filter((l) => l.url || l.label) }, memberIds }); };
  return (
    <Modal wide title={initial ? "تعديل المشروع" : "مشروع / حساب جديد"} onClose={onClose}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="الاسم *"><input style={inputStyle} value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="اسم المشروع/الحساب" /></Field>
        <Field label="العميل / البراند"><input style={inputStyle} value={f.client} onChange={(e) => set("client", e.target.value)} placeholder="اسم العميل" /></Field>
      </div>
      <Field label="المنصّات (اختر أكتر من واحدة)">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{Object.entries(PLATFORMS).map(([k, v]) => { const on = f.platforms.includes(k); return <button key={k} type="button" onClick={() => togglePlatform(k)} style={{ border: `1px solid ${on ? v.color : C.line}`, background: on ? v.color + "14" : "#fff", color: on ? v.color : C.inkSoft, padding: "6px 12px", borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{on ? "✓ " : ""}{v.label}</button>; })}</div>
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        <Field label="النوع"><select style={inputStyle} value={f.type} onChange={(e) => set("type", e.target.value)}><option value="account">حساب</option><option value="project">بروجكت</option></select></Field>
        <Field label="الهدف"><select style={inputStyle} value={f.objective} onChange={(e) => set("objective", e.target.value)}>{Object.entries(OBJECTIVES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></Field>
        <Field label="الأولوية"><select style={inputStyle} value={f.priority} onChange={(e) => set("priority", e.target.value)}>{Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="المعرّف / اليوزر"><input style={inputStyle} value={f.handle} onChange={(e) => set("handle", e.target.value)} placeholder="@username" /></Field>
        <Field label="الحالة"><select style={inputStyle} value={f.status} onChange={(e) => set("status", e.target.value)}><option value="active">نشط</option><option value="paused">متوقف</option></select></Field>
      </div>
      <Field label="الفريق المسؤول عن المشروع">
        {members.length === 0 ? <div style={{ fontSize: 13, color: C.inkSoft }}>ضيف أفراد من تبويب «الفريق» الأول.</div> : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{members.map((m) => { const on = memberIds.includes(m.id); const sn = SENIORITY[m.seniority] || SENIORITY.mid; return <button key={m.id} type="button" onClick={() => toggleMember(m.id)} style={{ border: `1px solid ${on ? C.primary : C.line}`, background: on ? C.primarySoft : "#fff", color: on ? C.primary : C.inkSoft, padding: "6px 12px", borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{on ? "✓ " : "+ "}{m.name} <span style={{ opacity: .7, fontSize: 11 }}>({sn.label})</span></button>; })}</div>
        )}
      </Field>
      <Field label="الروابط (موقع العميل / لينكات المنصّات)">
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {f.links.map((l, i) => (
            <div key={i} style={{ display: "flex", gap: 8 }}>
              <input style={{ ...inputStyle, flex: "0 0 130px" }} placeholder="الوصف (مثلاً: موقع العميل)" value={l.label} onChange={(e) => setLink(i, "label", e.target.value)} />
              <input style={{ ...inputStyle, flex: 1 }} placeholder="https://..." value={l.url} onChange={(e) => setLink(i, "url", e.target.value)} />
              <IconBtn danger onClick={() => delLink(i)}><Icon name="x" size={15} /></IconBtn>
            </div>
          ))}
          <Btn kind="ghost" size="sm" onClick={addLink} style={{ alignSelf: "flex-start" }}><Icon name="plus" size={14} /> إضافة رابط</Btn>
        </div>
      </Field>
      <Field label="تاريخ البداية"><input type="date" style={{ ...inputStyle, maxWidth: 200 }} value={f.startDate} onChange={(e) => set("startDate", e.target.value)} /></Field>
      <div style={{ background: C.bg, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ fontWeight: 800, fontSize: 13.5, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}><Icon name="target" size={15} color={C.primary} /> الأهداف الشهرية</div>
        <div style={{ fontSize: 12, color: C.inkSoft, marginBottom: 10 }}>سيب صفر لو مفيش هدف للمقياس ده.</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>{METRICS.map((mt) => <Field key={mt.key} label={mt.label}><input type="number" min="0" step="any" style={inputStyle} value={f.targets[mt.key]} onChange={(e) => setT(mt.key, e.target.value)} /></Field>)}</div>
      </div>
      <Field label="ملاحظات"><textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={f.notes} onChange={(e) => set("notes", e.target.value)} /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}><Btn onClick={submit}>حفظ</Btn><Btn kind="line" onClick={onClose}>إلغاء</Btn></div>
    </Modal>
  );
}

/* ===================== Team ===================== */
function Team({ data, update, month, setMonth }) {
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const save = (m) => { const exists = data.members.find((x) => x.id === m.id); update({ ...data, members: exists ? data.members.map((x) => (x.id === m.id ? m : x)) : [...data.members, m] }); setModal(null); };
  const remove = (id) => { if (!confirm("هتمسح الفرد ده وكل أرقام أدائه. متأكد؟")) return; update({ ...data, members: data.members.filter((x) => x.id !== id), assignments: data.assignments.filter((a) => a.memberId !== id), kpis: data.kpis.filter((k) => k.memberId !== id) }); setSelected(null); };
  const toggleAssign = (memberId, projectId) => { const ex = data.assignments.find((a) => a.memberId === memberId && a.projectId === projectId); update({ ...data, assignments: ex ? data.assignments.filter((a) => a !== ex) : [...data.assignments, { id: uid(), memberId, projectId }] }); };

  if (selected) { const m = data.members.find((x) => x.id === selected); if (m) return <MemberDetail data={data} member={m} month={month} setMonth={setMonth} onBack={() => setSelected(null)} onEdit={() => setModal({ ...m })} modal={modal} setModal={setModal} save={save} />; }
  const scores = teamScores(data, month);
  return (
    <div>
      <Header title="الفريق" sub="اضغط على أي فرد لعرض تقريره التفصيلي" right={<Btn onClick={() => setModal({ new: true })}><Icon name="userplus" size={16} /> إضافة فرد</Btn>} />
      {data.members.length === 0 ? (
        <Card><Empty icon="users" title="مفيش أفراد لسه" sub="ضيف أعضاء فريقك بأسمائهم ومستواهم." action={<Btn onClick={() => setModal({ new: true })}><Icon name="userplus" size={16} /> إضافة فرد</Btn>} /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 14 }}>
          {data.members.map((m) => {
            const projs = data.assignments.filter((a) => a.memberId === m.id).map((a) => data.projects.find((p) => p.id === a.projectId)).filter(Boolean);
            const sn = SENIORITY[m.seniority] || SENIORITY.mid, sc = scores.find((s) => s.member.id === m.id);
            return (
              <Card key={m.id}>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start", cursor: "pointer" }} onClick={() => setSelected(m.id)}>
                  <div style={{ width: 48, height: 48, borderRadius: 14, background: C.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 17, flexShrink: 0 }}>{memberInitials(m.name)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <div style={{ fontWeight: 800, fontSize: 17 }}>{m.name}</div>
                      <div style={{ display: "flex", gap: 4 }} onClick={(e) => e.stopPropagation()}><IconBtn onClick={() => setModal({ ...m })}><Icon name="pencil" size={15} /></IconBtn><IconBtn danger onClick={() => remove(m.id)}><Icon name="trash" size={15} /></IconBtn></div>
                    </div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 2 }}><Pill color={C.rose}>{ROLES[m.role] || m.role}</Pill><Pill color={sn.color}><Icon name="star" size={11} /> {sn.label}</Pill></div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                  <Mini label="درجة الشهر" v={sc ? sc.score : 0} />
                  <Mini label="عدد الحسابات" v={projs.length} />
                  <Mini label="منشورات" v={sc ? fmt(sc.posts) : 0} />
                </div>
                <div style={{ marginTop: 12, fontSize: 13, color: C.inkSoft, display: "flex", flexDirection: "column", gap: 5 }}>
                  {m.email && <span style={{ display: "flex", gap: 6, alignItems: "center" }}><Icon name="mail" size={14} /> {m.email}</span>}
                  {m.phone && <span style={{ display: "flex", gap: 6, alignItems: "center" }}><Icon name="phone" size={14} /> {m.phone}</span>}
                </div>
                <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>
                  <div style={{ fontSize: 12.5, fontWeight: 700, color: C.inkSoft, marginBottom: 8 }}>المشاريع المسؤول عنها</div>
                  {data.projects.length === 0 ? <div style={{ fontSize: 12.5, color: C.inkSoft }}>ضيف مشاريع الأول.</div> : (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{data.projects.map((p) => { const on = projs.find((x) => x.id === p.id); const pl = PLATFORMS[primaryPlatform(p)] || PLATFORMS.other; return <button key={p.id} onClick={() => toggleAssign(m.id, p.id)} style={{ border: `1px solid ${on ? pl.color : C.line}`, background: on ? pl.color + "14" : "#fff", color: on ? pl.color : C.inkSoft, padding: "5px 10px", borderRadius: 999, fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>{on ? "✓ " : "+ "}{p.name}</button>; })}</div>
                  )}
                </div>
              </Card>
            );
          })}
        </div>
      )}
      {modal && <MemberForm initial={modal.new ? null : modal} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

        </div>

      <Card style={{ marginBottom: 16 }}>
        <CardTitle>تفاصيل كل حساب — {monthLabel(month)}</CardTitle>
        {recs.length === 0 ? <Empty icon="trending" title="مفيش أرقام للشهر ده" sub="سجّل أداءه من تبويب الـKPIs." /> : (
          <div style={{ overflowX: "auto" }}>

              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}>{["الحساب / المشروع", "المنصّة", "منشورات", "محتوى", "تفاعل %", "وصول", "متابعين +", "التزام %"].map((h, i) => <th key={i} style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{recs.map((k) => { const p = data.projects.find((x) => x.id === k.projectId); const pl = p ? PLATFORMS[primaryPlatform(p)] : null; return (

/* ===================== Performance ===================== */
function Performance({ data, month, setMonth, update }) {
  const [modal, setModal] = useState(null);
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const saveKpi = (rec) => { const ex = data.kpis.find((k) => k.id === rec.id); update({ ...data, kpis: ex ? data.kpis.map((k) => (k.id === rec.id ? rec : k)) : [...data.kpis, rec] }); setModal(null); };
  const removeKpi = (id) => update({ ...data, kpis: data.kpis.filter((k) => k.id !== id) });
  const scores = useMemo(() => teamScores(data, month), [data, month]);
  const recs = data.kpis.filter((k) => k.month === month);
  const chartData = scores.filter((s) => s.count > 0).map((s) => ({ name: s.member.name.split(" ")[0], "منشورات": s.posts, "تفاعل": +s.engagement.toFixed(1) }));
  const canAdd = data.members.length && data.projects.length;
  return (
    <div>
      <Header title="الأداء و الـKPIs" sub="سجّل أرقام كل فرد على كل حساب — التقييم حسب المستوى" right={<><MonthPicker months={months} month={month} setMonth={setMonth} /><Btn onClick={() => canAdd && setModal({ new: true })} style={{ opacity: canAdd ? 1 : 0.5, cursor: canAdd ? "pointer" : "not-allowed" }}><Icon name="plus" size={16} /> تسجيل أداء</Btn></>} />
      {!canAdd && <Card style={{ marginBottom: 16, background: C.primarySoft, border: "none" }}><div style={{ color: C.primary, fontWeight: 700, fontSize: 14 }}>لازم يكون عندك فرد ومشروع على الأقل عشان تسجّل أداء.</div></Card>}
      {chartData.length > 0 && <Card style={{ marginBottom: 16 }}><CardTitle>مقارنة الأداء — {monthLabel(month)}</CardTitle><Bars data={chartData} series={[{ k: "منشورات", color: C.primary }, { k: "تفاعل", color: C.green }]} /><Legend items={[{ color: C.primary, label: "منشورات" }, { color: C.green, label: "تفاعل %" }]} /></Card>}
      {scores.some((s) => s.count > 0) && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 14, marginBottom: 16 }}>
          {scores.filter((s) => s.count > 0).map((s) => { const sn = SENIORITY[s.member.seniority] || SENIORITY.mid; return (
            <Card key={s.member.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><div style={{ fontWeight: 800, fontSize: 16 }}>{s.member.name}</div><div style={{ fontWeight: 800, color: C.primary, fontSize: 20 }}>{s.score}</div></div>
              <div style={{ marginBottom: 12 }}><Pill color={sn.color}><Icon name="star" size={11} /> {sn.label}</Pill></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Mini label="منشورات" v={fmt(s.posts)} /><Mini label="محتوى" v={fmt(s.content)} /><Mini label="تفاعل" v={s.engagement.toFixed(1) + "%"} /><Mini label="وصول" v={fmt(s.reach)} /><Mini label="متابعين +" v={fmt(s.followers)} /><Mini label="التزام" v={s.onTime.toFixed(0) + "%"} /></div>
            </Card>); })}
        </div>
      )}
      <Card>
        <CardTitle>سجلّات {monthLabel(month)}</CardTitle>
        {recs.length === 0 ? <Empty icon="trending" title="مفيش أرقام للشهر ده" sub={canAdd ? "اضغط «تسجيل أداء»." : "ضيف فريق ومشاريع الأول."} action={canAdd ? <Btn onClick={() => setModal({ new: true })}><Icon name="plus" size={16} /> تسجيل أداء</Btn> : null} /> : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 760 }}>
              <thead><tr style={{ color: C.inkSoft, textAlign: "right" }}>{["الفرد", "الحساب", "منشورات", "محتوى", "تفاعل %", "وصول", "متابعين +", "التزام %", ""].map((h, i) => <th key={i} style={{ padding: "8px 10px", fontWeight: 700, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
              <tbody>{recs.map((k) => { const m = data.members.find((x) => x.id === k.memberId), p = data.projects.find((x) => x.id === k.projectId), pl = p ? PLATFORMS[primaryPlatform(p)] : null; return (
                <tr key={k.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                  <td style={{ padding: "10px", fontWeight: 700 }}>{m ? m.name : "—"}</td><td style={{ padding: "10px" }}>{p ? <Pill color={pl.color}>{p.name}</Pill> : "—"}</td>
                  <td style={{ padding: "10px" }}>{fmt(k.posts)}</td><td style={{ padding: "10px" }}>{fmt(k.content)}</td><td style={{ padding: "10px" }}>{k.engagement}%</td><td style={{ padding: "10px" }}>{fmt(k.reach)}</td><td style={{ padding: "10px" }}>{fmt(k.followers)}</td><td style={{ padding: "10px" }}>{k.onTime}%</td>
                  <td style={{ padding: "10px" }}><div style={{ display: "flex", gap: 4 }}><IconBtn onClick={() => setModal({ ...k })}><Icon name="pencil" size={14} /></IconBtn><IconBtn danger onClick={() => removeKpi(k.id)}><Icon name="trash" size={14} /></IconBtn></div></td>
                </tr>); })}</tbody>
            </table>
          </div>
        )}
      </Card>
      {modal && <KpiForm initial={modal.new ? null : modal} data={data} month={month} onSave={saveKpi} onClose={() => setModal(null)} />}
    </div>
  );
}
function Mini({ label, v }) { return <div style={{ background: C.bg, borderRadius: 10, padding: "8px 10px", flex: 1 }}><div style={{ fontSize: 11.5, color: C.inkSoft }}>{label}</div><div style={{ fontWeight: 800, fontSize: 15 }}>{v}</div></div>; }
function KpiForm({ initial, data, month, onSave, onClose }) {

    </Modal>
  );
}

/* ===================== Reports ===================== */
function Reports({ data, month, setMonth }) {
  const months = useMemo(() => allMonths(data), [data.kpis]);
  const scores = useMemo(() => teamScores(data, month), [data, month]);
  const activeScores = scores.filter((s) => s.count > 0);
  const projRows = data.projects.map((p) => ({ p, ach: projectAchievement(data, p, month) })).filter((r) => r.ach.count > 0);
  const teamTrend = [...months].slice(0, 6).reverse().map((mn) => { const recs = data.kpis.filter((k) => k.month === mn); const eng = recs.length ? recs.reduce((a, r) => a + (+r.engagement || 0), 0) / recs.length : 0; return { name: monthLabel(mn).split(" ")[0], posts: recs.reduce((a, r) => a + (+r.posts || 0), 0), eng: +eng.toFixed(1), followers: recs.reduce((a, r) => a + (+r.followers || 0), 0) }; });
  const exportMembers = () => { const rows = [["الفرد", "المستوى", "الدور", "عدد الحسابات", "منشورات", "محتوى", "تفاعل %", "وصول", "نمو متابعين", "التزام %", "درجة الأداء"]]; activeScores.forEach((s) => rows.push([s.member.name, SENIORITY[s.member.seniority]?.label || "", ROLES[s.member.role] || "", s.count, Math.round(s.posts), Math.round(s.content), +s.engagement.toFixed(1), Math.round(s.reach), Math.round(s.followers), +s.onTime.toFixed(0), s.score])); downloadCSV(`اداء-الفريق-${month}.csv`, rows); };
  const exportDetailed = () => { const rows = [["الفرد", "المستوى", "الحساب", "العميل", "المنصّات", "منشورات", "محتوى", "تفاعل %", "وصول", "متابعين +", "التزام %"]]; data.kpis.filter((k) => k.month === month).forEach((k) => { const m = data.members.find((x) => x.id === k.memberId), p = data.projects.find((x) => x.id === k.projectId); rows.push([m?.name || "", SENIORITY[m?.seniority]?.label || "", p?.name || "", p?.client || "", p ? platformsLabel(p) : "", k.posts, k.content, k.engagement, k.reach, k.followers, k.onTime]); }); downloadCSV(`تفصيلي-فرد-حساب-${month}.csv`, rows); };
  const exportProjects = () => { const rows = [["المشروع", "العميل", "المنصّات", "منشورات/هدف", "تفاعل/هدف", "وصول/هدف", "متابعين/هدف", "نسبة الإنجاز %"]]; projRows.forEach(({ p, ach }) => { const g = (key) => { const x = ach.perMetric.find((m) => m.key === key); return `${Math.round(x.actual * 10) / 10} / ${x.target || "—"}`; }; rows.push([p.name, p.client || "", platformsLabel(p), g("posts"), g("engagement"), g("reach"), g("followers"), ach.overall == null ? "—" : ach.overall]); }); downloadCSV(`تقرير-المشاريع-${month}.csv`, rows); };
  const noData = activeScores.length === 0 && projRows.length === 0;
  return (
    <div>
      <Header title="التقارير" sub={`ملخّص شامل قابل للتصدير — ${monthLabel(month)}`} right={<>
        <MonthPicker months={months} month={month} setMonth={setMonth} />
        <Btn kind="line" onClick={exportMembers}><Icon name="download" size={15} /> أفراد (مجمّع)</Btn>
        <Btn kind="line" onClick={exportDetailed}><Icon name="download" size={15} /> تفصيلي</Btn>
        <Btn kind="line" onClick={exportProjects}><Icon name="download" size={15} /> مشاريع</Btn>
        <Btn onClick={() => window.print()}><Icon name="print" size={15} /> طباعة / PDF</Btn>
      </>} />
      {noData ? <Card><Empty icon="report" title="مفيش بيانات للشهر ده" sub="سجّل أداء في تبويب الـKPIs الأول." /></Card> : (
        <>
          <Card style={{ marginBottom: 16 }}><CardTitle>الاتجاه العام للفريق</CardTitle><LineDual data={teamTrend} series={[{ k: "posts", color: C.primary, label: "منشورات" }, { k: "eng", color: C.green, label: "تفاعل %" }, { k: "followers", color: C.amber, label: "متابعين" }]} /><Legend items={[{ color: C.primary, label: "منشورات" }, { color: C.green, label: "تفاعل %" }, { color: C.amber, label: "نمو متابعين" }]} /></Card>

          <Card style={{ marginBottom: 16 }}>
            <CardTitle>تقرير أداء الأفراد (مجمّع)</CardTitle>

                <tbody>{activeScores.map((s) => { const sn = SENIORITY[s.member.seniority] || SENIORITY.mid; return (

/* ===================== Settings ===================== */
function Settings({ data, update }) {
  const fileRef = useRef(null);
  const setW = (lvl, key, val) => { const v = val === "" ? 0 : Number(val); update({ ...data, weights: { ...data.weights, [lvl]: { ...data.weights[lvl], [key]: v } } }); };
  const reset = () => { if (confirm("ترجّع كل الأوزان للوضع الافتراضي؟")) update({ ...data, weights: JSON.parse(JSON.stringify(DEFAULT_WEIGHTS)) }); };
  const backup = () => downloadFile(`backup-${nowMonth()}.json`, JSON.stringify(data, null, 2), "application/json");
  const onImport = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => { try { const d = migrate(JSON.parse(r.result)); if (confirm("هيتم استبدال كل البيانات الحالية بالنسخة المستوردة. متأكد؟")) update(d); } catch (err) { alert("الملف غير صالح."); } e.target.value = ""; }; r.readAsText(file); };
  return (
    <div>
      <Header title="الإعدادات والأوزان" sub="أوزان التقييم + النسخ الاحتياطي" right={<Btn kind="line" onClick={reset}>إعادة الأوزان للافتراضي</Btn>} />

      <Card style={{ marginBottom: 16 }}>
        <CardTitle>النسخ الاحتياطي (مهم)</CardTitle>
        <div style={{ fontSize: 13.5, color: C.inkSoft, lineHeight: 1.8, marginBottom: 14 }}>
          البيانات محفوظة على المتصفّح ده بس. اعمل نسخة احتياطية بشكل دوري، أو لو هتفتح من جهاز تاني — صدّر الملف وارفعه على الجهاز التاني. كمان دي طريقتك لنقل البيانات بين الأجهزة.
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Btn onClick={backup}><Icon name="download" size={16} /> تنزيل نسخة احتياطية</Btn>
          <Btn kind="line" onClick={() => fileRef.current && fileRef.current.click()}><Icon name="upload" size={16} /> استيراد نسخة</Btn>
          <input ref={fileRef} type="file" accept="application/json,.json" onChange={onImport} style={{ display: "none" }} />
        </div>
      </Card>

      <Card style={{ marginBottom: 16, background: C.primarySoft, border: "none" }}>
        <div style={{ color: C.ink, fontSize: 13.5, lineHeight: 1.8 }}>الفكرة: نفس الأرقام بتتحسب بأوزان مختلفة حسب مستوى الفرد. الجونيور وزنه أعلى على <b>الكمية والتنفيذ</b>، والسينيور على <b>التأثير</b>. الأرقام نِسَب — مش لازم مجموعها ١٠٠، السيستم بيوازن تلقائيًا.</div>
      </Card>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14 }}>
        {Object.entries(SENIORITY).map(([lvl, sn]) => { const w = data.weights[lvl] || {}; const sum = METRIC_KEYS.reduce((s, k) => s + (+w[k] || 0), 0); return (
          <Card key={lvl}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}><Pill color={sn.color}><Icon name="star" size={12} /> {sn.label}</Pill><span style={{ fontSize: 12, color: C.inkSoft }}>المجموع: <b style={{ color: C.ink }}>{sum}</b></span></div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{METRICS.map((mt) => <div key={mt.key} style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 13, flex: 1 }}>{mt.label}</span><input type="number" min="0" step="1" value={w[mt.key] ?? 0} onChange={(e) => setW(lvl, mt.key, e.target.value)} style={{ ...inputStyle, width: 70, padding: "7px 10px", textAlign: "center" }} /></div>)}</div>
          </Card>); })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
